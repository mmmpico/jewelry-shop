<!DOCTYPE html>
<html>
<head>
    <title>DeStashe Admin - Fulfillment Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://fnlgermttuaibfvmbite.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
        var _sb;

        window.onload = function() {
            _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            _sb.auth.onAuthStateChange((event, session) => {
                if (session) {
                    document.getElementById('authBox').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    loadItems();
                } else {
                    document.getElementById('authBox').style.display = 'block';
                    document.getElementById('mainApp').style.display = 'none';
                }
            });
        };

        async function doLogin() {
            const { error } = await _sb.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('pass').value
            });
            if (error) alert(error.message);
        }

        async function uploadItem() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Saving...";
            const file = document.getElementById('ItemImage').files[0];
            let url = "https://via.placeholder.com/150";

            if (file) {
                const name = `img-${Date.now()}`;
                await _sb.storage.from('jewelry-photos').upload(name, file);
                const { data } = _sb.storage.from('jewelry-photos').getPublicUrl(name);
                url = data.publicUrl;
            }

            const { data: { user } } = await _sb.auth.getUser();
            await _sb.from('InventoryHistory').insert([{
                ItemName: document.getElementById('ItemName').value,
                ItemCategory: document.getElementById('ItemCategory').value,
                Collection: document.getElementById('Collection').value,
                Price: parseFloat(document.getElementById('Price').value),
                image_url: url,
                Status: 'Available',
                user_id: user.id,
                creator_handle: 'destashe'
            }]);
            location.reload();
        }

        // CLAIM LOGIC
        async function claimItem(id) {
            const buyer = prompt("Buyer Name/Handle:");
            const bag = prompt("Bag Number:");
            if (!buyer || !bag) return alert("Buyer and Bag # are required to claim.");
            
            await _sb.from('InventoryHistory').update({ 
                Status: 'Pending', 
                ClaimedBy: buyer, 
                BagNumber: bag 
            }).eq('id', id);
            location.reload();
        }

        async function shipItem(id) {
            const tracking = prompt("Enter Tracking Number:");
            if (!tracking) return;
            await _sb.from('InventoryHistory').update({ 
                Status: 'Sold', 
                TrackingNumber: tracking 
            }).eq('id', id);
            location.reload();
        }

        async function loadItems() {
            const { data: { user } } = await _sb.auth.getUser();
            const { data } = await _sb.from('InventoryHistory').select('*').eq('user_id', user.id).neq('Status', 'Sold').order('BagNumber', { ascending: true });

            const tbody = document.querySelector('#inventoryTable tbody');
            tbody.innerHTML = data.map(item => `
                <tr style="${item.Status === 'Pending' ? 'background:#fff9e6;' : ''}">
                    <td><img src="${item.image_url}" class="thumb"></td>
                    <td><strong>${item.ItemName}</strong><br><small>${item.Collection}</small></td>
                    <td>${item.BagNumber || '--'}</td>
                    <td>${item.ClaimedBy || 'Available'}</td>
                    <td>
                        ${item.Status === 'Available' ? 
                            `<button onclick="claimItem('${item.id}')" class="btn-claim">Claim</button>` : 
                            `<button onclick="shipItem('${item.id}')" class="btn-ship">Ship It</button>
                             <button onclick="releaseItem('${item.id}')" class="btn-release">X</button>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        async function releaseItem(id) {
            if(confirm("Release back to inventory?")) {
                await _sb.from('InventoryHistory').update({ Status: 'Available', ClaimedBy: null, BagNumber: null }).eq('id', id);
                location.reload();
            }
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfbfb; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; }
        #authBox { max-width: 400px; margin: 100px auto; text-align: center; background:white; padding:40px; border-radius:12px; }
        .auth-input, input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .auth-btn, .save-btn { width: 100%; padding: 15px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .row { display: flex; gap: 15px; margin-bottom: 10px; }
        .row div { flex: 1; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #999; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        .thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .btn-claim { background: #ffa500; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-ship { background: #4CAF50; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-release { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

<div id="authBox">
    <h2 style="color:#d4af37">Creator Login</h2>
    <input type="email" id="email" class="auth-input" placeholder="Email">
    <input type="password" id="pass" class="auth-input" placeholder="Password">
    <button class="auth-btn" onclick="doLogin()">Log In</button>
</div>

<div class="container" id="mainApp">
    <h1>Fulfillment Manager</h1>
    
    <div class="form-section" style="background:#f9f9f9; padding:20px; border-radius:8px; margin-bottom:30px;">
        <h3>Add New Item</h3>
        <div class="row">
            <div><label>Name</label><input type="text" id="ItemName"></div>
            <div><label>Category</label><select id="ItemCategory"><option>Ring</option><option>Necklace</option></select></div>
            <div><label>Collection</label><input type="text" id="Collection"></div>
            <div><label>Retail $</label><input type="number" id="Price" step="0.01"></div>
        </div>
        <div class="row">
            <div><label>Photo</label><input type="file" id="ItemImage"></div>
            <div style="display:flex; align-items:flex-end;"><button class="save-btn" id="saveBtn" onclick="uploadItem()">Save Item</button></div>
        </div>
    </div>

    <table id="inventoryTable">
        <thead><tr><th>Photo</th><th>Item</th><th>Bag #</th><th>Buyer</th><th>Control</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

</body>
</html>
