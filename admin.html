<!DOCTYPE html>
<html>
<head>
    <title>DeStashe Admin - Master Fulfillment</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://fnlgermttuaibfvmbite.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
        var _sb;

        window.onload = function() {
            _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            _sb.auth.onAuthStateChange((event, session) => {
                if (session) {
                    document.getElementById('authBox').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    loadItems();
                } else {
                    document.getElementById('authBox').style.display = 'block';
                    document.getElementById('mainApp').style.display = 'none';
                }
            });
        };

        async function doLogin() {
            const { error } = await _sb.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('pass').value
            });
            if (error) alert(error.message);
        }

        // UPDATED LOAD ITEMS WITH CARRIER AND ISSUE LOGIC
        async function loadItems() {
            const { data: { user } } = await _sb.auth.getUser();
            // Show everything NOT "Closed"
            const { data } = await _sb.from('InventoryHistory')
                .select('*')
                .eq('user_id', user.id)
                .neq('Status', 'Closed')
                .order('BagNumber', { ascending: true });

            const tbody = document.querySelector('#inventoryTable tbody');
            tbody.innerHTML = data.map(item => `
                <tr class="row-${item.Status.toLowerCase()}">
                    <td><img src="${item.image_url}" class="thumb"></td>
                    <td>
                        <strong>${item.ItemName}</strong><br>
                        <small>Bag: ${item.BagNumber || 'N/A'}</small>
                    </td>
                    <td>
                        <select onchange="updateItemStatus('${item.id}', this.value)" class="status-select">
                            <option value="Available" ${item.Status === 'Available' ? 'selected' : ''}>Available</option>
                            <option value="Pending" ${item.Status === 'Pending' ? 'selected' : ''}>Pending (Claimed)</option>
                            <option value="Shipped" ${item.Status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                            <option value="Issue" ${item.Status === 'Issue' ? 'selected' : ''}>⚠️ Issue</option>
                            <option value="Closed" ${item.Status === 'Closed' ? 'selected' : ''}>✅ Closed Out</option>
                        </select>
                    </td>
                    <td>
                        ${item.Status === 'Shipped' || item.Status === 'Issue' ? 
                            `<small>${item.Carrier || 'No Carrier'}: ${item.TrackingNumber || 'No Tracking'}</small>` : 
                            `Buyer: ${item.ClaimedBy || 'None'}`
                        }
                    </td>
                    <td>
                        <button onclick="editFullDetails('${item.id}')" class="btn-edit">Details</button>
                    </td>
                </tr>
            `).join('');
        }

        async function updateItemStatus(id, newStatus) {
            let updates = { Status: newStatus };
            
            if (newStatus === 'Shipped') {
                const carrier = prompt("Carrier (USPS/UPS/FedEx):", "USPS");
                const tracking = prompt("Tracking Number:");
                if(carrier && tracking) {
                    updates.Carrier = carrier;
                    updates.TrackingNumber = tracking;
                }
            }
            
            if (newStatus === 'Issue') {
                const note = prompt("What is the issue?");
                updates.IssueNotes = note;
            }

            await _sb.from('InventoryHistory').update(updates).eq('id', id);
            location.reload();
        }

        // We can build a modal for this later, for now, simple alerts
        function editFullDetails(id) {
            alert("This will eventually open a full profile for this specific item/buyer!");
        }

        async function uploadItem() {
            // ... (Same upload logic as before)
            location.reload();
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfbfb; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; }
        #authBox { max-width: 400px; margin: 100px auto; text-align: center; background:white; padding:40px; border-radius:12px; }
        .auth-input, input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .status-select { padding: 5px; font-size: 12px; border-radius: 4px; }
        
        /* Row Colors based on Status */
        .row-pending { background-color: #fff9e6; }
        .row-shipped { background-color: #e6f3ff; }
        .row-issue { background-color: #ffe6e6; border-left: 5px solid red; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        .thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .btn-edit { background: #eee; border: 1px solid #ccc; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="authBox">
    <h2 style="color:#d4af37">Creator Login</h2>
    <input type="email" id="email" class="auth-input" placeholder="Email">
    <input type="password" id="pass" class="auth-input" placeholder="Password">
    <button class="auth-btn" onclick="doLogin()" style="width:100%; padding:15px; background:#222; color:white; border:none; border-radius:6px; cursor:pointer;">Log In</button>
</div>

<div class="container" id="mainApp">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>Fulfillment Command Center</h1>
        <button onclick="_sb.auth.signOut().then(()=>location.reload())" style="cursor:pointer; border:none; background:none; color:#999;">Log Out</button>
    </div>

    <div style="background:#f9f9f9; padding:15px; border-radius:8px; margin-bottom:20px; display:flex; gap:10px;">
        <input type="text" id="ItemName" placeholder="Item Name" style="margin:0;">
        <input type="number" id="Price" placeholder="Price" style="margin:0; width:100px;">
        <input type="file" id="ItemImage" style="margin:0; font-size:10px;">
        <button onclick="uploadItem()" style="background:#222; color:white; padding:0 20px; border-radius:6px; border:none; cursor:pointer;">Add</button>
    </div>

    <table id="inventoryTable">
        <thead>
            <tr>
                <th>Photo</th>
                <th>Item/Bag</th>
                <th>Status</th>
                <th>Shipping/Buyer Info</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

</body>
</html>
