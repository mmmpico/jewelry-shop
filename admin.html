<!DOCTYPE html>
<html>
<head>
    <title>DeStashe Admin - Final Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #fdfbfb; padding: 20px; }
        #authContainer { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border: 1px solid #eee; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; }
        .auth-btn { width: 100%; padding: 12px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .auth-btn:hover { background: #d4af37; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; display: none; }
    </style>
</head>
<body>

<div id="authContainer">
    <h2 style="color:#d4af37">Creator Login</h2>
    <input type="email" id="loginEmail" class="auth-input" placeholder="Email Address">
    <input type="password" id="loginPassword" class="auth-input" placeholder="Password">
    <button class="auth-btn" onclick="signInUser()">Log In</button>
</div>

<div id="appContainer" class="container">
    <h1>Welcome Back!</h1>
    <button onclick="supabase.auth.signOut().then(() => location.reload())">Log Out</button>
    <p>You are logged in. Your inventory will appear here shortly.</p>
</div>

<script>
    // ALERT TO PROVE THE CODE LOADED
    console.log("Script is active and running!");

    const MY_HANDLE = 'destashe'; 
    const SUPABASE_URL = 'https://fnlgermttuaibfvmbite.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Watch for Login
    _supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
        }
    });

    async function signInUser() {
        console.log("Login button clicked!");
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) {
            alert("Please enter both email and password.");
            return;
        }

        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
        
        if (error) {
            alert("Login Failed: " + error.message);
        } else {
            console.log("Login Success!", data);
        }
    }
</script>
</body>
</html>
