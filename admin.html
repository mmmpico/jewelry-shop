<!DOCTYPE html>
<html>
<head>
    <title>DeStashe Command Center - Master Fulfillment Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f9; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 1400px; margin: auto; display: none; }
        #authBox { max-width: 400px; margin: 100px auto; text-align: center; background:white; padding:40px; border-radius:16px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .auth-input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 16px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 24px; border: 1px solid #eef2f6; overflow: hidden; }
        .station-header { background: #fafbfc; padding: 15px 20px; border-bottom: 1px solid #edf2f7; display: flex; justify-content: space-between; }
        .station-header h3 { margin: 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; }
        .intake-body { padding: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 15px; }
        label { font-size: 10px; font-weight: 700; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; width: 100%; box-sizing: border-box; }
        .btn-main { background: #1e293b; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .item-strip { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #f1f5f9; font-size: 12px; }
        .img-mini { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; background: #f1f5f9; border: 1px solid #eee; }
        .bag-badge { background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 4px; font-weight: 800; }
        .btn-action { padding: 6px 12px; border-radius: 4px; border: 1px solid #e2e8f0; cursor: pointer; font-size: 10px; font-weight: 700; background: white; }
        .btn-pay { background: #22c55e; color: white; border: none; }
        .btn-ship { background: #3b82f6; color: white; border: none; }
    </style>
</head>
<body>

<div id="authBox">
    <h2 style="color:#d4af37;">DeStashe Login</h2>
    <input type="email" id="email" class="auth-input" placeholder="Email">
    <input type="password" id="pass" class="auth-input" placeholder="Password">
    <button class="btn-main" style="width:100%" onclick="doLogin()">Sign In</button>
</div>

<div class="container" id="mainApp">
    <header style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h1 style="font-size:22px;">Command Center</h1>
        <button onclick="doLogout()" style="background:none; border:none; color:#94a3b8; cursor:pointer;">Log Out</button>
    </header>

    <div class="card">
        <div class="station-header"><h3>1. Inventory Intake</h3></div>
        <div class="intake-body">
            <form id="inventoryForm">
                <div class="form-grid">
                    <div style="grid-column: span 2;"><label>Item Name *</label><input type="text" id="ItemName" required></div>
                    <div><label>SKU / ID</label><input type="text" id="SKU" placeholder="BP-100"></div>
                    <div><label>Category</label><select id="ItemCategory">
                        <option>Ring</option><option>Necklace</option><option>Earrings</option><option>Bracelet</option><option>Necklace Set</option><option>Earring Set</option><option>Stacks</option><option>Set (Mixed)</option>
                    </select></div>
                    <div><label>Collection *</label><input list="cols" id="Collection" required><datalist id="cols"></datalist></div>
                </div>
                <div class="form-grid">
                    <div><label>Plating</label><select id="Plating">
                        <option>Gold</option><option>Rose Gold</option><option>Rhodium</option><option>Silver</option><option>Hematite</option><option>Mixed</option>
                    </select></div>
                    <div><label>Stone</label><input type="text" id="Stone"></div>
                    <div><label>Rarity</label><select id="Rarity">
                        <option>Collection Piece</option><option>Unicorn</option><option>Rare Unicorn</option><option>Ultra Rare Unicorn</option><option>Bella</option><option>Lillian</option><option>Diamond</option>
                    </select></div>
                    <div><label>PurchasePrice (Cost)</label><input type="number" id="PurchasePrice" step="0.01"></div>
                    <div><label>ListedPrice (Retail) *</label><input type="number" id="ListedPrice" step="0.01" required></div>
                    <div><label>Set Count</label><input type="number" id="SetCount" value="1"></div>
                    <div><label>Photo</label><input type="file" id="ItemImage" accept="image/*"></div>
                </div>
                <button type="button" class="btn-main" id="saveBtn" onclick="uploadItem()">+ Add to Vault</button>
            </form>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="card"><div class="station-header"><h3>2. Claimed (Waiting Payment)</h3></div><div id="list-pending"></div></div>
        <div class="card"><div class="station-header"><h3>3. Paid (Ready to Ship)</h3></div><div id="list-paid"></div></div>
        <div class="card" style="grid-column: span 2;"><div class="station-header"><h3>4. All Available Inventory</h3></div><div id="list-available"></div></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://fnlgermttuaibfvmbite.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
    const COLLECTIONS = ["Originals 2023", "Originals 2024", "Originals 2025", "Originals 2026", "Spring Stacks", "Summer Stacks", "Fall Stacks", "Wicked", "Holiday Stacks", "Sterling Club", "Elevated Elegance", "Birthday Months"];
    const NO_IMG = "https://via.placeholder.com/150?text=No+Photo";
    
    var _sb;

    window.onload = function() {
        _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: true } });
        _sb.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('cols').innerHTML = COLLECTIONS.map(c => `<option value="${c}">`).join('');
                loadEverything();
            } else {
                document.getElementById('authBox').style.display = 'block';
                document.getElementById('mainApp').style.display = 'none';
            }
        });
    };

    async function doLogin() {
        const { error } = await _sb.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('pass').value });
        if (error) alert(error.message);
    }

    async function doLogout() { await _sb.auth.signOut(); location.reload(); }

    async function uploadItem() {
        const btn = document.getElementById('saveBtn');
        if (!document.getElementById('inventoryForm').checkValidity()) return alert("Check required fields!");
        btn.innerText = "Saving..."; btn.disabled = true;

        let finalUrl = "";
        const file = document.getElementById('ItemImage').files[0];
        
        if (file) {
            const fileName = `img-${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi, '_')}`;
            const { data, error: uploadErr } = await _sb.storage.from('jewelry-photos').upload(fileName, file);
            if (uploadErr) { alert("Upload error: " + uploadErr.message); }
            else {
                const { data: urlData } = _sb.storage.from('jewelry-photos').getPublicUrl(fileName);
                finalUrl = urlData.publicUrl;
            }
        }

        const { data: { user } } = await _sb.auth.getUser();
        const { error: dbErr } = await _sb.from('InventoryHistory').insert([{
            ItemName: document.getElementById('ItemName').value,
            SKU: document.getElementById('SKU').value,
            ItemCategory: document.getElementById('ItemCategory').value,
            Collection: document.getElementById('Collection').value,
            Plating: document.getElementById('Plating').value,
            Rarity: document.getElementById('Rarity').value,
            Stone: document.getElementById('Stone').value,
            PurchasePrice: parseFloat(document.getElementById('PurchasePrice').value) || 0,
            ListedPrice: parseFloat(document.getElementById('ListedPrice').value) || 0,
            SetCount: parseInt(document.getElementById('SetCount').value) || 1,
            image_url: finalUrl,
            Status: 'Available',
            user_id: user.id,
            creator_handle: 'destashe'
        }]);

        if (dbErr) { alert("DB Error: " + dbErr.message); btn.disabled = false; btn.innerText = "+ Add to Vault"; }
        else { location.reload(); }
    }

    async function loadEverything() {
        const { data: { user } } = await _sb.auth.getUser();
        const { data } = await _sb.from('InventoryHistory').select('*').eq('user_id', user.id).neq('ItemName', 'SYSTEM_STORE_STATUS').neq('Status','Closed').order('CreatedAt', { ascending: false });
        
        const divPending = document.getElementById('list-pending');
        const divPaid = document.getElementById('list-paid');
        const divAvail = document.getElementById('list-available');
        divPending.innerHTML = ""; divPaid.innerHTML = ""; divAvail.innerHTML = "";

        const now = new Date();
        data.forEach(item => {
            const canDelete = (item.Status === 'Available' && Math.floor((now - new Date(item.CreatedAt)) / 60000) < 60);
            const img = item.image_url && item.image_url !== "" ? item.image_url : NO_IMG;

            const html = `
                <div class="item-strip">
                    <img src="${img}" class="img-mini" onerror="this.src='${NO_IMG}'">
                    <div style="flex:1">
                        <span style="font-weight:700; display:block;">${item.ItemName}</span>
                        <span style="font-size:10px; color:#64748b;">${item.SKU || 'No SKU'} • MSRP: $${item.ListedPrice}</span>
                    </div>
                    ${item.Status === 'Pending' ? `<div class="bag-badge">Bag ${item.BagNumber}</div><div style="font-size:11px; color:#64748b;">@${item.ClaimedBy}</div>` : ''}
                    <div style="display:flex; gap:5px;">
                        ${item.Status === 'Available' ? `<button class="btn-action" onclick="claim('${item.id}')">Claim</button>` : ''}
                        ${item.Status === 'Pending' && !item.PaymentReceived ? `<button class="btn-action btn-pay" onclick="markPaid('${item.id}')">Paid?</button>` : ''}
                        ${item.Status === 'Pending' && item.PaymentReceived ? `<button class="btn-action btn-ship" onclick="ship('${item.id}')">Ship</button>` : ''}
                        ${item.Status === 'Pending' ? `<button class="btn-action" onclick="release('${item.id}')">Release</button>` : ''}
                        ${canDelete ? `<button onclick="deleteItem('${item.id}')" style="color:red; border:none; background:none; cursor:pointer; font-size:18px;">×</button>` : ''}
                    </div>
                </div>`;

            if (item.Status === 'Available') divAvail.innerHTML += html;
            else if (item.Status === 'Pending' && !item.PaymentReceived) divPending.innerHTML += html;
            else if (item.Status === 'Pending' && item.PaymentReceived) divPaid.innerHTML += html;
        });
    }

    async function claim(id) {
        const handle = prompt("Buyer Social Handle:");
        const bag = prompt("Bag Number:");
        if (handle && bag) await _sb.from('InventoryHistory').update({ Status: 'Pending', ClaimedBy: handle, BagNumber: bag, PaymentReceived: false }).eq('id', id);
        location.reload();
    }

    async function markPaid(id) {
        const salePrice = prompt("Enter FINAL Sale Price:");
        if (!salePrice || isNaN(salePrice)) return alert("Required: Valid Sale Price.");
        await _sb.from('InventoryHistory').update({ PaymentReceived: true, SalePrice: parseFloat(salePrice) }).eq('id', id);
        location.reload();
    }

    async function ship(id) {
        const track = prompt("Tracking Number:");
        if (track) await _sb.from('InventoryHistory').update({ Status: 'Shipped', TrackingNumber: track }).eq('id', id);
        location.reload();
    }

    async function release(id) {
        if(confirm("Release back to vault?")) {
            await _sb.from('InventoryHistory').update({ Status: 'Available', ClaimedBy: null, BagNumber: null, PaymentReceived: false, SalePrice: null }).eq('id', id);
            location.reload();
        }
    }

    async function deleteItem(id) { if (confirm("Delete permanently?")) { await _sb.from('InventoryHistory').delete().eq('id', id); location.reload(); } }
</script>
</body>
</html>
