<!DOCTYPE html>
<html>
<head>
    <title>DeStashe Admin - Fulfillment Command</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfbfb; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; }
        #authBox { max-width: 400px; margin: 100px auto; text-align: center; background:white; padding:40px; border-radius:12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .auth-input, input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .save-btn { width: 100%; padding: 15px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        
        .row { display: flex; gap: 15px; margin-bottom: 10px; flex-wrap: wrap; }
        .row div { flex: 1; min-width: 150px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #999; text-transform: uppercase; }
        
        /* TABLE STYLING */
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: white; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 12px; vertical-align: middle; }
        th { color: #aaa; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; background: #fafafa; }
        .thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; border: 1px solid #eee; }
        
        /* STATUS BADGES */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; display: inline-block; }
        .s-available { background: #e6fffa; color: #2c7a7b; }
        .s-pending { background: #fff9e6; color: #b7791f; border: 1px solid #fbd38d; }
        .s-shipped { background: #ebf8ff; color: #2b6cb0; }
        
        .btn-action { cursor: pointer; border: 1px solid #ddd; background: white; padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .btn-action:hover { background: #f4f4f4; }
        tr:hover { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div id="authBox">
    <h2 style="color:#d4af37">Creator Login</h2>
    <input type="email" id="email" class="auth-input" placeholder="Email">
    <input type="password" id="pass" class="auth-input" placeholder="Password">
    <button class="save-btn" style="width:100%" onclick="doLogin()">Log In</button>
</div>

<div class="container" id="mainApp">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1>Inventory & Shipping Hub</h1>
        <button onclick="_sb.auth.signOut().then(()=>location.reload())" style="cursor:pointer; border:none; background:none; color:#999;">Log Out</button>
    </div>

    <form id="inventoryForm" style="background:#fdfdfd; padding:20px; border-radius:10px; border: 1px solid #eee; margin-bottom:40px;">
        <div class="row">
            <div style="flex: 2;"><label>Item Name *</label><input type="text" id="ItemName" required></div>
            <div><label>Category</label><select id="ItemCategory"><option>Ring</option><option>Necklace</option><option>Earrings</option><option>Bracelet</option><option>Stacks</option
