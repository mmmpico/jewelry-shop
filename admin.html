<!DOCTYPE html>
<html>
<head>
    <title>DeStashe Admin - Master Inventory</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfbfb; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* AUTH BOX */
        #authContainer { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .auth-btn:hover { background: #d4af37; }

        /* LIVE STATUS PANEL */
        .live-panel { background: #f4f4f4; border: 2px solid #ddd; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 30px; transition: 0.3s; }
        .live-panel.is-live { background: #fff5f5; border-color: #ff4d4d; }
        
        /* FORM GRID */
        .row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .row div { flex: 1; min-width: 150px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #888; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .save-btn { width: 100%; padding: 18px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; font-size: 13px; }
        th { color: #999; text-transform: uppercase; font-size: 10px; }
        img.thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

<div id="authContainer">
    <h2 style="color:#d4af37">Creator Login</h2>
    <input type="email" id="emailField" class="auth-input" placeholder="Email Address">
    <input type="password" id="passField" class="auth-input" placeholder="Password">
    <button class="auth-btn" id="loginBtn">Log In</button>
</div>

<div class="container" id="appContainer" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1>Inventory Manager</h1>
        <button onclick="supabase.auth.signOut().then(()=>location.reload())" style="cursor:pointer; border:none; background:none; color:#888;">Log Out</button>
    </div>

    <div class="live-panel" id="livePanel">
        <div id="liveStatusText" style="font-weight:bold; margin-bottom:10px; text-transform:uppercase;">Store Status: OFFLINE</div>
        <button onclick="toggleLiveStatus()" style="padding:10px 20px; cursor:pointer; border-radius:20px; border:1px solid #ddd;">Toggle Live Status</button>
    </div>

    <div class="form-section">
        <div class="row">
            <div style="flex: 2;"><label>Item Name</label><input type="text" id="ItemName"></div>
            <div>
                <label>Category</label>
                <select id="ItemCategory">
                    <option>Ring</option><option>Necklace</option><option>Earrings</option><option>Bracelet</option><option>Stacks</option><option>Set</option>
                </select>
            </div>
            <div><label>Collection</label><input list="cols" id="Collection"><datalist id="cols"></datalist></div>
        </div>

        <div class="row">
            <div>
                <label>Plating</label>
                <select id="Plating">
                    <option>Gold</option><option>Rose Gold</option><option>Rhodium</option><option>Silver</option><option>Hematite</option><option>Mixed</option>
                </select>
            </div>
            <div style="flex: 1.5;"><label>Stone</label><input type="text" id="Stone" placeholder="e.g. Amethyst"></div>
            <div>
                <label>Rarity</label>
                <select id="Rarity">
                    <option>Collection Piece</option><option>Unicorn</option><option>Rare Unicorn</option><option>Diamonds</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div><label>Purchase Price (Cost) ($)</label><input type="number" id="PurchasePrice" step="0.01"></div>
            <div><label>Retail Price (Sell) ($)</label><input type="number" id="Price" step="0.01"></div>
            <div><label>Photo</label><input type="file" id="ItemImage"></div>
        </div>
        
        <button class="save-btn" id="saveBtn" onclick="uploadToSupabase()">Add to My Collection</button>
    </div>

    <h2>My Inventory</h2>
    <table id="inventoryTable">
        <thead><tr><th>Photo</th><th>Item</th><th>Rarity</th><th>Collection</th><th>Cost/Retail</th><th>Action</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const MY_HANDLE = 'destashe'; 
    const SUPABASE_URL = 'https://fnlgermttuaibfvmbite.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const collections = ["Originals 2024", "Spring Stacks 2024", "Summer Stacks 2024", "Fall Stacks 2024", "Wicked 2024", "Holiday Stacks 2024", "Originals 2025", "January 2025 Birthday", "February 2025 Birthday"];

    let currentUser = null;

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('emailField').value;
        const password = document.getElementById('passField').value;
        const { error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
    });

    _supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
            currentUser = session.user;
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            const list = document.getElementById('cols');
            list.innerHTML = "";
            collections.forEach(c => { let o = document.createElement('option'); o.value = c; list.appendChild(o); });
            loadData();
        } else {
            document.getElementById('authContainer').style.display = 'block';
            document.getElementById('appContainer').style.display = 'none';
        }
    });

    async function loadData() {
        const { data } = await _supabase.from('InventoryHistory').select('*').eq('creator_handle', MY_HANDLE).neq('ItemName', 'SYSTEM_STORE_STATUS').order('CreatedAt', { ascending: false });
        const tbody = document.querySelector('#inventoryTable tbody');
        tbody.innerHTML = "";
        data?.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `<td><img src="${item.image_url}" class="thumb"></td><td><strong>${item.ItemName}</strong></td><td>${item.Rarity}</td><td>${item.Collection}</td><td>$${item.PurchasePrice || 0} / $${item.Price}</td><td><button onclick="deleteItem('${item.id}')" style="color:red; cursor:pointer; border:none; background:none;">Delete</button></td>`;
            tbody.appendChild(row);
        });
        checkLiveStatus();
    }

    async function checkLiveStatus() {
        const { data } = await _supabase.from('InventoryHistory').select('*').eq('ItemName', 'SYSTEM_STORE_STATUS').eq('creator_handle', MY_HANDLE);
        if (data && data.length > 0) {
            const isLive = (data[0].Status === 'Paused');
            document.getElementById('livePanel').className = isLive ? 'live-panel is-live' : 'live-panel';
            document.getElementById('liveStatusText').innerText = isLive ? "🚨 Store Status: LIVE ON TIKTOK 🚨" : "Store Status: OFFLINE";
            document.getElementById('livePanel').style.background = isLive ? "#fff5f5" : "#f4f4f4";
        }
    }

    async function toggleLiveStatus() {
        const { data: current } = await _supabase.from('InventoryHistory').select('*').eq('ItemName', 'SYSTEM_STORE_STATUS').eq('creator_handle', MY_HANDLE);
        const isLiveNow = current && current.length > 0 && current[0].Status === 'Paused';
        const newStatus = isLiveNow ? 'Available' : 'Paused';

        const { data } = await _supabase.from('InventoryHistory').update({ Status: newStatus }).eq('ItemName', 'SYSTEM_STORE_STATUS').eq('creator_handle', MY_HANDLE).select();
        if (!data || data.length === 0) {
            await _supabase.from('InventoryHistory').insert([{ ItemName: 'SYSTEM_STORE_STATUS', Status: newStatus, creator_handle: MY_HANDLE, user_id: currentUser.id }]);
        }
        location.reload();
    }

    async function uploadToSupabase() {
        const btn = document.getElementById('saveBtn');
        const file = document.getElementById('ItemImage').files[0];
        btn.innerText = "UPLOADING...";
        btn.disabled = true;

        let publicUrl = "";
        if (file) {
            const name = MY_HANDLE + '-' + Date.now() + '-' + file.name;
            await _supabase.storage.from('jewelry-photos').upload(name, file);
            const { data } = _supabase.storage.from('jewelry-photos').getPublicUrl(name);
            publicUrl = data.publicUrl;
        }

        const { error } = await _supabase.from('InventoryHistory').insert([{
            ItemName: document.getElementById('ItemName').value,
            ItemCategory: document.getElementById('ItemCategory').value,
            Collection: document.getElementById('Collection').value,
            Plating: document.getElementById('Plating').value,
            Rarity: document.getElementById('Rarity').value,
            Stone: document.getElementById('Stone').value,
            PurchasePrice: parseFloat(document.getElementById('PurchasePrice').value) || 0,
            Price: parseFloat(document.getElementById('Price').value) || 0,
            image_url: publicUrl,
            Status: 'Available',
            creator_handle: MY_HANDLE,
            user_id: currentUser.id
        }]);
        
        if (error) { alert(error.message); btn.disabled = false; btn.innerText = "Add to My Collection"; }
        else location.reload();
    }

    async function deleteItem(id) {
        if (confirm("Delete permanently?")) { await _supabase.from('InventoryHistory').delete().eq('id', id); location.reload(); }
    }
</script>
</body>
</html>
