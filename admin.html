<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeStashe Command Center - V60</title>
    <style>
        :root { --slate: #1e293b; --gold: #d4af37; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: #334155; margin: 0; padding: 20px; }
        
        /* AUTH SECTION */
        .auth-card { max-width: 400px; margin: 80px auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; border: 1px solid var(--border); }
        .auth-card h2 { color: var(--gold); margin-bottom: 20px; }
        .auth-field { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }

        /* MAIN DASHBOARD */
        .container { max-width: 1400px; margin: auto; display: none; }
        .nav-bar { background: var(--slate); color: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .scan-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 6px; width: 300px; outline: none; }

        /* CARDS & FORMS */
        .card { background: white; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 24px; overflow: hidden; }
        .header { background: #f1f5f9; padding: 12px 20px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 800; text-transform: uppercase; color: #64748b; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; padding: 20px; }
        label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; }
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 13px; }
        
        .btn-main { background: var(--slate); color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; text-transform: uppercase; }
        .btn-sm { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: white; cursor: pointer; font-size: 10px; font-weight: 700; }
        
        /* ITEM ROWS */
        .item-row { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #f1f5f9; font-size: 12px; }
        .badge-set { background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 4px; font-weight: 800; font-size: 10px; }
        .badge-bag { background: #fef3c7; color: #92400e; padding: 2px 6px; border-radius: 4px; font-weight: 800; font-size: 10px; }
    </style>
</head>
<body>

    <div id="authBox" class="auth-card">
        <h2>DeStashe Admin</h2>
        <input type="email" id="email" class="auth-field" placeholder="Email Address">
        <input type="password" id="pass" class="auth-field" placeholder="Password">
        <button class="btn-main" onclick="handleLogin()">Sign In</button>
    </div>

    <div class="container" id="mainApp">
        <div class="nav-bar">
            <div style="display:flex; align-items:center; gap:15px;">
                <strong>SCANNER MODE</strong>
                <input type="checkbox" id="scannerToggle">
                <input type="text" id="globalSearch" placeholder="Zap SKU..." class="scan-input">
            </div>
            <button onclick="handleLogout()" style="color:white; background:none; border:none; cursor:pointer; font-weight:bold; text-decoration:underline;">Log Out</button>
        </div>

        <div class="card">
            <div class="header">1. New Inventory Intake</div>
            <form id="iForm" class="form-grid">
                <div style="grid-column: span 2;"><label>Item Name *</label><input type="text" id="iName" required></div>
                <div><label>Brand SKU</label><input type="text" id="iSku"></div>
                <div><label>Category</label><select id="iCat">
                    <option>Ring</option><option>Necklace</option><option>Earrings</option><option>Bracelet</option><option>Stacks</option><option>Necklace Set</option><option>Earring Set</option><option>Set (Mixed)</option><option>Stacks (Mixed)</option>
                </select></div>
                <div><label>Collection *</label><input list="cols" id="iCol" required><datalist id="cols"></datalist></div>
                <div><label>Plating</label><select id="iPlat"><option>Gold</option><option>Rose Gold</option><option>Rhodium</option><option>Silver</option><option>Hematite</option><option>Mixed</option></select></div>
                <div><label>Rarity</label><select id="iRare">
                    <option>Collection Piece</option><option>Unicorn</option><option>Rare Unicorn</option><option>Ultra Rare</option><option>Bella</option><option>Lillian</option><option>Diamond</option>
                </select></div>
                <div><label>Set Count</label><input type="number" id="iSet" value="1"></div>
                <div><label>CostPrice</label><input type="number" id="iCost" step="0.01"></div>
                <div><label>ListedPrice (MSRP) *</label><input type="number" id="iMSRP" step="0.01" required></div>
                <div style="grid-column: span 2;"><button type="button" class="btn-main" onclick="handleSave()">Save to Vault</button></div>
            </form>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="card"><div class="header">2. Claimed (Unpaid)</div><div id="list-P"></div></div>
            <div class="card"><div class="header">3. Paid (Ready to Ship)</div><div id="list-S"></div></div>
            <div class="card" style="grid-column: span 2;"><div class="header">4. Available Merchandise Vault</div><div id="list-A"></div></div>
        </div>
    </div>
