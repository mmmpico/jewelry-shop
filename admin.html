<!DOCTYPE html>
<html>
<head>
    <title>DeStashe Command Center - Audited Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = 'https://fnlgermttuaibfvmbite.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
        const COLLECTIONS = ["Originals 2023", "Originals 2024", "Originals 2025", "Originals 2026", "Spring Stacks", "Summer Stacks", "Fall Stacks", "Wicked", "Holiday Stacks", "Sterling Club", "Elevated Elegance", "Jan Birthday", "Feb Birthday", "Mar Birthday", "Apr Birthday", "May Birthday", "Jun Birthday", "Jul Birthday", "Aug Birthday", "Sep Birthday", "Oct Birthday", "Nov Birthday", "Dec Birthday"];
        const OFFLINE_IMG = "data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%2250%22%20height%3D%2250%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Crect%20width%3D%2250%22%20height%3D%2250%22%20fill%3D%22%23eee%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-family%3D%22Arial%22%20font-size%3D%228%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20fill%3D%22%23aaa%22%3ENo%20Photo%3C%2Ftext%3E%3C%2Fsvg%3E";

        let _sb;

        // AUTH FUNCTIONS
        function initSupabase() {
            _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            checkUser();
        }

        async function checkUser() {
            const { data: { session } } = await _sb.auth.getSession();
            if (session) {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('cols').innerHTML = COLLECTIONS.map(c => `<option value="${c}">`).join('');
                loadEverything();
            } else {
                document.getElementById('authBox').style.display = 'block';
                document.getElementById('mainApp').style.display = 'none';
            }
        }

        async function doSignIn() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const { error } = await _sb.auth.signInWithPassword({ email, password: pass });
            if (error) alert(error.message); else location.reload();
        }

        async function doSignOut() { await _sb.auth.signOut(); location.reload(); }

        // INVENTORY FUNCTIONS
        async function uploadItem() {
            const btn = document.getElementById('saveBtn');
            if (!document.getElementById('inventoryForm').checkValidity()) return alert("Fill in required fields!");
            btn.innerText = "Processing..."; btn.disabled = true;

            let finalUrl = "";
            const file = document.getElementById('ItemImage').files[0];
            if (file) {
                const fileName = `img-${Date.now()}`;
                await _sb.storage.from('jewelry-photos').upload(fileName, file);
                finalUrl = _sb.storage.from('jewelry-photos').getPublicUrl(fileName).data.publicUrl;
            }

            const { data: { user } } = await _sb.auth.getUser();
            const { error } = await _sb.from('InventoryHistory').insert([{
                ItemName: document.getElementById('ItemName').value,
                BrandSku: document.getElementById('BrandSku').value,
                ItemCategory: document.getElementById('ItemCategory').value,
                Collection: document.getElementById('Collection').value,
                Plating: document.getElementById('Plating').value,
                Rarity: document.getElementById('Rarity').value,
                Stone: document.getElementById('Stone').value,
                CostPrice: parseFloat(document.getElementById('CostPrice').value) || 0,
                ListedPrice: parseFloat(document.getElementById('ListedPrice').value) || 0,
                SetCount: parseInt(document.getElementById('SetCount').value) || 1,
                image_url: finalUrl,
                Status: 'Available',
                user_id: user.id,
                creator_handle: 'destashe'
            }]);

            if (error) { alert("DB Error: " + error.message); btn.disabled = false; btn.innerText = "+ Add to Vault"; }
            else { location.reload(); }
        }

        async function loadEverything() {
            const { data: { user } } = await _sb.auth.getUser();
            const { data } = await _sb.from('InventoryHistory').select('*').eq('user_id', user.id).neq('ItemName', 'SYSTEM_STORE_STATUS').neq('Status','Closed').order('CreatedAt', { ascending: false });
            
            const divP = document.getElementById('list-pending');
            const divS = document.getElementById('list-paid');
            const divA = document.getElementById('list-available');
            divP.innerHTML = ""; divS.innerHTML = ""; divA.innerHTML = "";

            data?.forEach(item => {
                const img = item.image_url || OFFLINE_IMG;
                const html = `<div class="item-strip">
                    <img src="${img}" class="img-mini" onerror="this.src='${OFFLINE_IMG}'">
                    <div style="flex:1"><strong>${item.ItemName}</strong><br><small>${item.BrandSku || 'No SKU'} | $${item.ListedPrice}</small></div>
                    <div style="display:flex; gap:5px;">
                        ${item.Status === 'Available' ? `<button class="btn-action" onclick="claim('${item.id}')">Claim</button>` : ''}
                        ${item.Status === 'Pending' && !item.PaymentReceived ? `<button class="btn-action" onclick="markPaid('${item.id}')">Paid?</button>` : ''}
                        ${item.Status === 'Pending' && item.PaymentReceived ? `<button class="btn-action" onclick="ship('${item.id}')">Ship</button>` : ''}
                        <button onclick="deleteItem('${item.id}')" style="color:red; border:none; background:none; cursor:pointer; font-size:18px;">×</button>
                    </div>
                </div>`;
                if (item.Status === 'Available') divA.innerHTML += html;
                else if (item.Status === 'Pending' && !item.PaymentReceived) divP.innerHTML += html;
                else if (item.Status === 'Pending' && item.PaymentReceived) divS.innerHTML += html;
            });
        }

        async function claim(id) {
            const h = prompt("Buyer:"); const b = prompt("Bag #:");
            if (h && b) await _sb.from('InventoryHistory').update({ Status: 'Pending', ClaimedBy: h, BagNumber: b, PaymentReceived: false }).eq('id', id);
            location.reload();
        }

        async function markPaid(id) {
            const p = prompt("Final Sale Price:");
            if (p) await _sb.from('InventoryHistory').update({ PaymentReceived: true, SalePrice: parseFloat(p) }).eq('id', id);
            location.reload();
        }

        async function ship(id) {
            const t = prompt("Tracking:");
            if (t) await _sb.from('InventoryHistory').update({ Status: 'Shipped', TrackingNumber: t }).eq('id', id);
            location.reload();
        }

        async function deleteItem(id) { if (confirm("Delete?")) { await _sb.from('InventoryHistory').delete().eq('id', id); location.reload(); } }

        window.onload = initSupabase;
    </script>

        body { font-family: 'Inter', sans-serif; background: #f4f7f9; padding
