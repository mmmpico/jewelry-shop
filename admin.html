<!DOCTYPE html>
<html>
<head>
    <title>DeStashe Admin - FIXED</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfbfb; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #authBox { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .row div { flex: 1; min-width: 150px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #888; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 18px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        img.thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

<div id="authBox">
    <h2 style="color:#d4af37">Creator Login</h2>
    <input type="email" id="email" class="auth-input" placeholder="Email">
    <input type="password" id="pass" class="auth-input" placeholder="Password">
    <button class="auth-btn" onclick="doLogin()">Log In</button>
</div>

<div class="container" id="mainApp" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1>Inventory Manager</h1>
        <button onclick="doLogout()">Log Out</button>
    </div>

    <div class="form-section">
        <div class="row">
            <div style="flex: 2;"><label>Item Name</label><input type="text" id="ItemName"></div>
            <div><label>Category</label><select id="ItemCategory"><option>Ring</option><option>Necklace</option><option>Earrings</option><option>Stacks</option></select></div>
            <div><label>Collection</label><input list="cols" id="Collection"><datalist id="cols"></datalist></div>
        </div>
        <div class="row">
            <div><label>Plating</label><select id="Plating"><option>Gold</option><option>Rose Gold</option><option>Rhodium</option><option>Silver</option></select></div>
            <div style="flex: 1.5;"><label>Stone</label><input type="text" id="Stone"></div>
            <div><label>Rarity</label><select id="Rarity"><option>Collection Piece</option><option>Unicorn</option><option>Diamonds</option></select></div>
        </div>
        <div class="row">
            <div><label>Cost ($)</label><input type="number" id="PurchasePrice" step="0.01"></div>
            <div><label>Retail ($)</label><input type="number" id="Price" step="0.01"></div>
            <div><label>Photo</label><input type="file" id="ItemImage"></div>
        </div>
        <button class="save-btn" onclick="uploadItem()">Add to My Collection</button>
    </div>

    <table id="inventoryTable">
        <thead><tr><th>Photo</th><th>Item</th><th>Rarity</th><th>Collection</th><th>Cost/Retail</th><th>Action</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const MY_HANDLE = 'destashe'; 
    const URL = 'https://fnlgermttuaibfvmbite.supabase.co';
    const KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
    const _sb = supabase.createClient(URL, KEY);

    const collections = ["Originals 2024", "Spring Stacks 2024", "Summer Stacks 2024", "Fall Stacks 2024", "Wicked 2024", "Originals 2025"];

    // Monitor Session
    _sb.auth.onAuthStateChange((event, session) => {
        if (session) {
            document.getElementById('authBox').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            setupCols();
            loadItems();
        } else {
            document.getElementById('authBox').style.display = 'block';
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    async function doLogin() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        const { error } = await _sb.auth.signInWithPassword({ email: e, password: p });
        if (error) alert(error.message);
    }

    async function doLogout() {
        await _sb.auth.signOut();
        location.reload();
    }

    function setupCols() {
        const l = document.getElementById('cols');
        l.innerHTML = "";
        collections.forEach(c => { let o = document.createElement('option'); o.value = c; l.appendChild(o); });
    }

    async function loadItems() {
        const { data } = await _sb.from('InventoryHistory').select('*').eq('creator_handle', MY_HANDLE).neq('ItemName', 'SYSTEM_STORE_STATUS').order('CreatedAt', { ascending: false });
        const tbody = document.querySelector('#inventoryTable tbody');
        tbody.innerHTML = "";
        data?.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `<td><img src="${item.image_url}" class="thumb"></td><td><strong>${item.ItemName}</strong></td><td>${item.Rarity}</td><td>${item.Collection}</td><td>$${item.PurchasePrice || 0} / $${item.Price}</td><td><button onclick="deleteItem('${item.id}')" style="color:red; border:none; background:none; cursor:pointer;">Delete</button></td>`;
            tbody.appendChild(row);
        });
    }

    async function uploadItem() {
        const file = document.getElementById('ItemImage').files[0];
        let url = "";
        if (file) {
            const name = MY_HANDLE + '-' + Date.now() + '-' + file.name;
            await _sb.storage.from('jewelry-photos').upload(name, file);
            const { data } = _sb.storage.from('jewelry-photos').getPublicUrl(name);
            url = data.publicUrl;
        }

        const { data: userSession } = await _sb.auth.getSession();
        
        await _sb.from('InventoryHistory').insert([{
            ItemName: document.getElementById('ItemName').value,
            ItemCategory: document.getElementById('ItemCategory').value,
            Collection: document.getElementById('Collection').value,
            Plating: document.getElementById('Plating').value,
            Rarity: document.getElementById('Rarity').value,
            Stone: document.getElementById('Stone').value,
            PurchasePrice: parseFloat(document.getElementById('PurchasePrice').value) || 0,
            Price: parseFloat(document.getElementById('Price').value) || 0,
            image_url: url,
            Status: 'Available',
            creator_handle: MY_HANDLE,
            user_id: userSession.session.user.id
        }]);
        location.reload();
    }

    async function deleteItem(id) {
        if (confirm("Delete?")) { await _sb.from('InventoryHistory').delete().eq('id', id); location.reload(); }
    }
</script>
</body>
</html>
