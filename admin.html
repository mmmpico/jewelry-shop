<!DOCTYPE html>
<html>
<head>
    <title>DeStashe Command Center - RECOVERY</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .auth-card { max-width: 350px; margin: 100px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #1e293b; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .container { max-width: 1200px; margin: auto; display: none; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-main { background: #1e293b; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .item-row { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .img-preview { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; background: #eee; }
    </style>
</head>
<body>

<div id="authBox" class="auth-card">
    <h2 style="color:#d4af37">DeStashe Admin</h2>
    <input type="email" id="email" class="auth-input" placeholder="Email">
    <input type="password" id="pass" class="auth-input" placeholder="Password">
    <button class="btn-login" onclick="login()">SIGN IN</button>
    <p id="errMsg" style="color:red; font-size:12px; display:none;"></p>
</div>

<div id="mainApp" class="container">
    <div style="display:flex; justify-content:space-between;">
        <h1>Command Center</h1>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="card">
        <h3>1. Inventory Intake</h3>
        <form id="inventoryForm">
            <div class="form-grid">
                <div style="grid-column: span 2;"><label>Item Name *</label><input type="text" id="ItemName" required></div>
                <div><label>SKU / ID</label><input type="text" id="SKU"></div>
                <div><label>Category</label>
                    <select id="ItemCategory">
                        <option>Ring</option><option>Necklace</option><option>Earrings</option><option>Bracelet</option><option>Stacks</option><option>Necklace Set</option><option>Earring Set</option><option>Set (Mixed)</option>
                    </select>
                </div>
                <div><label>Collection *</label><input list="cols" id="Collection" required><datalist id="cols"></datalist></div>
            </div>
            <div class="form-grid">
                <div><label>Plating</label>
                    <select id="Plating">
                        <option>Gold</option><option>Rose Gold</option><option>Rhodium</option><option>Silver</option><option>Hematite</option><option>Mixed</option>
                    </select>
                </div>
                <div><label>Stone</label><input type="text" id="Stone"></div>
                <div><label>Rarity</label>
                    <select id="Rarity">
                        <option>Collection Piece</option><option>Unicorn</option><option>Rare Unicorn</option><option>Ultra Rare Unicorn</option><option>Bella</option><option>Lillian</option><option>Diamond</option>
                    </select>
                </div>
                <div><label>CostPrice</label><input type="number" id="CostPrice" step="0.01"></div>
                <div><label>ListedPrice *</label><input type="number" id="ListedPrice" step="0.01" required></div>
                <div><label>Set Count</label><input type="number" id="SetCount" value="1"></div>
            </div>
            <input type="file" id="ItemImage">
            <button type="button" class="btn-main" onclick="save()">+ Add Item</button>
        </form>
    </div>

    <div class="dashboard">
        <div class="card"><h4>2. Claimed (Unpaid)</h4><div id="list-pending"></div></div>
        <div class="card"><h4>3. Paid (Ready to Ship)</h4><div id="list-paid"></div></div>
        <div class="card" style="grid-column: span 2;"><h4>4. Available Merchandise</h4><div id="list-available"></div></div>
    </div>
</div>
