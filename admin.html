<!DOCTYPE html>
<html>
<head>
    <title>Jewelry Admin - Manage Inventory</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .form-section { border-bottom: 2px solid #eee; padding-bottom: 30px; margin-bottom: 30px; }
        input, select { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; background: #222; color: white; border: none; border-radius: 4px; }
        
        /* The Management Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #eee; }
        .btn-delete { background: #ff4d4d; margin-left: 5px; }
        .btn-edit { background: #4da6ff; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-section">
        <h2>Add New Item</h2>
        <input type="text" id="ItemName" placeholder="Item Name">
        <div style="display:flex; gap:10px;">
            <input type="number" id="Price" placeholder="Price">
            <select id="ItemCategory">
                <option value="Ring">Ring</option>
                <option value="Necklace">Necklace</option>
                <option value="Earrings">Earrings</option>
            </select>
            <select id="Status">
                <option value="Available">Available</option>
                <option value="Sold">Sold</option>
            </select>
        </div>
        <input type="file" id="ItemImage" accept="image/*">
        <button onclick="uploadToSupabase()">Save Item</button>
    </div>

    <h2>Current Inventory</h2>
    <table id="inventoryTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    const SUPABASE_URL = 'https://fnlgermttuaibfvmbite.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 1. LOAD THE TABLE
    async function loadTable() {
        const { data, error } = await _supabase.from('InventoryHistory').select('*').order('created_at', { ascending: false });
        if (error) return;

        const tbody = document.querySelector('#inventoryTable tbody');
        tbody.innerHTML = "";

        data.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${item.ItemName}</td>
                <td>${item.ItemCategory}</td>
                <td>$${item.Price}</td>
                <td>${item.Status}</td>
                <td>
                    <button class="btn-edit" onclick="editItem('${item.id}', '${item.ItemName}', ${item.Price})">Edit Price</button>
                    <button class="btn-delete" onclick="deleteItem('${item.id}')">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    // 2. ADD NEW ITEM (Same as before)
    async function uploadToSupabase() {
        const file = document.getElementById('ItemImage').files[0];
        let publicUrl = null;

        if (file) {
            const name = Date.now() + '-' + file.name;
            await _supabase.storage.from('jewelry-photos').upload(name, file);
            const { data } = _supabase.storage.from('jewelry-photos').getPublicUrl(name);
            publicUrl = data.publicUrl;
        }

        const itemData = {
            ItemName: document.getElementById('ItemName').value,
            ItemCategory: document.getElementById('ItemCategory').value,
            Price: parseFloat(document.getElementById('Price').value),
            Status: document.getElementById('Status').value,
            image_url: publicUrl
        };

        await _supabase.from('InventoryHistory').insert([itemData]);
        location.reload();
    }

    // 3. DELETE ITEM
    async function deleteItem(id) {
        if (confirm("Are you sure you want to delete this?")) {
            const { error } = await _supabase.from('InventoryHistory').delete().eq('id', id);
            if (!error) location.reload();
        }
    }

    // 4. EDIT PRICE (Simple version for now)
    async function editItem(id, currentName, currentPrice) {
        const newPrice = prompt(`Enter new price for ${currentName}:`, currentPrice);
        if (newPrice !== null) {
            const { error } = await _supabase.from('InventoryHistory').update({ Price: parseFloat(newPrice) }).eq('id', id);
            if (!error) location.reload();
        }
    }

    loadTable();
</script>

</body>
</html>
