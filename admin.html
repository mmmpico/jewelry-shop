<!DOCTYPE html>
<html>
<head>
    <title>DeStashe Admin - Master Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfbfb; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; }
        #authBox { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .row div { flex: 1; min-width: 150px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #888; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 18px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; font-size: 13px; }
        img.thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

<div id="authBox">
    <h2 style="color:#d4af37">Creator Login</h2>
    <input type="email" id="email" class="auth-input" placeholder="Email">
    <input type="password" id="pass" class="auth-input" placeholder="Password">
    <button class="auth-btn" onclick="doLogin()">Log In</button>
</div>

<div class="container" id="mainApp">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1>Inventory Manager</h1>
        <button onclick="doLogout()" style="cursor:pointer; border:1px solid #ddd; padding:5px 10px; border-radius:5px;">Log Out</button>
    </div>

    <div class="form-section">
        <div class="row">
            <div style="flex: 2;"><label>Item Name</label><input type="text" id="ItemName"></div>
            <div>
                <label>Category</label>
                <select id="ItemCategory">
                    <option>Ring</option><option>Necklace</option><option>Earrings</option><option>Bracelet</option><option>Stacks</option><option>Set</option>
                </select>
            </div>
            <div><label>Collection</label><input list="cols" id="Collection"><datalist id="cols"></datalist></div>
        </div>

        <div class="row">
            <div>
                <label>Plating</label>
                <select id="Plating">
                    <option>Gold</option><option>Rose Gold</option><option>Rhodium</option><option>Silver</option><option>Hematite</option><option>Mixed</option>
                </select>
            </div>
            <div style="flex: 1.5;"><label>Stone</label><input type="text" id="Stone" placeholder="e.g. Blue Zircon"></div>
            <div>
                <label>Rarity</label>
                <select id="Rarity">
                    <option>Collection Piece</option><option>Unicorn</option><option>Rare Unicorn</option><option>Diamonds</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div><label>Cost ($)</label><input type="number" id="PurchasePrice" step="0.01"></div>
            <div><label>Retail ($)</label><input type="number" id="Price" step="0.01"></div>
            <div><label>Photo</label><input type="file" id="ItemImage"></div>
        </div>
        
        <button class="save-btn" onclick="uploadItem()">Add to My Collection</button>
    </div>

    <table id="inventoryTable">
        <thead><tr><th>Photo</th><th>Item</th><th>Rarity</th><th>Collection</th><th>Cost/Retail</th><th>Action</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>

    const SUPABASE_KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
    
    // Initialize Supabase
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const collections = ["Originals 2024", "Spring Stacks 2024", "Summer Stacks 2024", "Fall Stacks 2024", "Wicked 2024", "Holiday Stacks 2024", "Originals 2025"];

    _sb.auth.onAuthStateChange((event, session) => {
        if (session) {
            document.getElementById('authBox').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            setupCols();
            loadItems();
        } else {
            document.getElementById('authBox').style.display = 'block';
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    async function doLogin() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        const { error } = await _sb.auth.signInWithPassword({ email: e, password: p });
        if (error) alert(error.message);
    }

    async function doLogout() {
        await _sb.auth.signOut();
        location.reload();
    }

    function setupCols() {
        const l = document.getElementById('cols');
        l.innerHTML = "";
        collections.forEach(c => { let o = document.createElement('option'); o.value = c; l.appendChild(o); });
    }

    async function loadItems() {

            tbody.appendChild(row);
        });
    }
