<!DOCTYPE html>
<html>
<head>
    <title>Jewelry Admin - Master Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfbfb; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-section { border-bottom: 2px solid #eee; padding-bottom: 30px; margin-bottom: 30px; }
        h1 { font-weight: 300; text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 30px; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .row div { flex: 1; min-width: 200px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #888; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; background: #fff; }
        .save-btn { width: 100%; padding: 18px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }
        .save-btn:hover { background: #d4af37; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; font-size: 12px; }
        th { background: #f9f9f9; color: #999; text-transform: uppercase; font-size: 10px; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        img.thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
        .rarity-tag { font-size: 10px; font-weight: bold; color: #d4af37; text-transform: uppercase; }
        .price-cost { color: #888; font-size: 11px; }
        .price-retail { font-weight: bold; color: #2c7a7b; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-section">
        <h1>Inventory Manager</h1>
        
        <div class="row">
            <div style="flex: 2;">
                <label>Item Name</label>
                <input type="text" id="ItemName">
            </div>
            <div>
                <label>Category</label>
                <select id="ItemCategory">
                    <option value="Ring">Ring</option>
                    <option value="Necklace">Necklace</option>
                    <option value="Necklace Set">Necklace Set</option>
                    <option value="Earrings">Earrings</option>
                    <option value="Earring Set">Earring Set</option>
                    <option value="Bracelet">Bracelet</option>
                    <option value="Set">Set (Mixed)</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div><label>Brand Name</label><input type="text" id="BrandName" value="Bomb Party"></div>
            <div><label>Brand SKU</label><input type="text" id="BrandSku"></div>
            <div>
                <label>Collection (Type to Search)</label>
                <input list="collectionOptions" id="Collection" placeholder="e.g. October 2025">
                <datalist id="collectionOptions"></datalist>
            </div>
        </div>

        <div class="row">
            <div>
                <label>Plating</label>
                <select id="Plating">
                    <option value="Gold">Gold</option>
                    <option value="Rose Gold">Rose Gold</option>
                    <option value="Rhodium">Rhodium</option>
                    <option value="Silver">Silver</option>
                    <option value="Hematite">Hematite</option>
                    <option value="Rose Gold/Rhodium">Rose Gold/Rhodium</option>
                    <option value="Mixed">Mixed</option>
                </select>
            </div>
            <div>
                <label>Rarity / Edition</label>
                <select id="Rarity">
                    <option value="Collection">Collection Piece</option>
                    <option value="Unicorn">Unicorn</option>
                    <option value="Rare Unicorn">Rare Unicorn</option>
                    <option value="Ultra Rare Unicorn">Ultra Rare Unicorn</option>
                    <option value="Lillian's Choice">Lillian's Choice</option>
                    <option value="Bella's Choice">Bella's Choice</option>
                    <option value="Diamonds">Diamonds</option>
                </select>
            </div>
            <div><label>Stone</label><input type="text" id="Stone"></div>
        </div>

        <div class="row">
            <div><label>Purchase Price (Cost) ($)</label><input type="number" id="PurchasePrice" step="0.01"></div>
            <div><label>Retail Price (Sell) ($)</label><input type="number" id="Price" step="0.01"></div>
            <div>
                <label>Status</label>
                <select id="Status">
                    <option value="Available">Available</option>
                    <option value="Sold">Sold</option>
                    <option value="Paused">Paused</option>
                    <option value="Pending">Pending</option>
                </select>
            </div>
            <div><label>Photo</label><input type="file" id="ItemImage" accept="image/*"></div>
        </div>

        <label>Notes</label>
        <textarea id="Notes" rows="2"></textarea>
        
        <button class="save-btn" id="saveBtn" onclick="uploadToSupabase()">Add to Collection</button>
    </div>

    <h2>Live Inventory</h2>
    <table id="inventoryTable">
        <thead>
            <tr>
                <th>Photo</th>
                <th>Item</th>
                <th>Rarity</th>
                <th>SKU</th>
                <th>Stone/Plating</th>
                <th>Collection</th>
                <th>Cost / Retail</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

    const SUPABASE_URL = 'https://fnlgermttuaibfvmbite.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function setupSearchableList() {
        const list = document.getElementById('collectionOptions');
        myCollections.forEach(col => {
            let opt = document.createElement('option');
            opt.value = col;
            list.appendChild(opt);
        });
    }

    async function loadTable() {
        const { data, error } = await _supabase.from('InventoryHistory').select('*').order('created_at', { ascending: false });
        if (error) return;
        const tbody = document.querySelector('#inventoryTable tbody');
        tbody.innerHTML = "";
        data.forEach(item => {
            const row = document.createElement('tr');
            const photo = item.image_url ? `<img src="${item.image_url}" class="thumb">` : `<div style="width:60px;height:60px;background:#eee;"></div>`;
            row.innerHTML = `
                <td>${photo}</td>
                <td><strong>${item.ItemName || '---'}</strong><br><small>${item.ItemCategory || ''}</small></td>
                <td class="rarity-tag">${item.Rarity || 'Collection'}</td>
                <td>${item.BrandSku || ''}</td>
                <td>${item.Stone || ''}<br><small>${item.Plating || ''}</small></td>
                <td>${item.Collection || '---'}</td>
                <td>
                    <span class="price-cost">Cost: $${item.PurchasePrice || '0'}</span><br>
                    <span class="price-retail">Sell: $${item.Price || '0'}</span>
                </td>
                <td><button class="btn-delete" onclick="deleteItem('${item.id}')">Delete</button></td>
            `;
            tbody.appendChild(row);
        });
    }

    async function uploadToSupabase() {
        const btn = document.getElementById('saveBtn');
        const file = document.getElementById('ItemImage').files[0];
        let publicUrl = null;
        btn.innerText = "UPLOADING...";
        btn.disabled = true;

        if (file) {
            const name = Date.now() + '-' + file.name;
            await _supabase.storage.from('jewelry-photos').upload(name, file);
            const { data } = _supabase.storage.from('jewelry-photos').getPublicUrl(name);
            publicUrl = data.publicUrl;
        }

        const itemData = {
            ItemName: document.getElementById('ItemName').value,
            ItemCategory: document.getElementById('ItemCategory').value,
            BrandName: document.getElementById('BrandName').value,
            BrandSku: document.getElementById('BrandSku').value,
            Collection: document.getElementById('Collection').value,
            Plating: document.getElementById('Plating').value,
            Rarity: document.getElementById('Rarity').value,
            Stone: document.getElementById('Stone').value,
            PurchasePrice: parseFloat(document.getElementById('PurchasePrice').value) || 0,
            Price: parseFloat(document.getElementById('Price').value) || 0,
            Status: document.getElementById('Status').value,
            Notes: document.getElementById('Notes').value,
            image_url: publicUrl
        };

        const { error } = await _supabase.from('InventoryHistory').insert([itemData]);
        if (!error) location.reload();
        else { alert("Error: " + error.message); btn.disabled = false; btn.innerText = "Add to Collection"; }
    }

    async function deleteItem(id) {
        if (confirm("Delete permanently?")) {
            await _supabase.from('InventoryHistory').delete().eq('id', id);
            location.reload();
        }
    }

    setupSearchableList();
    loadTable();
