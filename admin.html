<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DeStashe Hub - V41 Naked Master</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f9; padding: 20px; color: #333; margin: 0; }
        .box { max-width: 400px; margin: 80px auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        .container { max-width: 1200px; margin: auto; display: none; }
        input, select { padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; }
        .btn-black { background: #1e293b; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; width: 100%; text-transform: uppercase; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 24px; border: 1px solid #eef2f6; overflow: hidden; }
        .header { background: #fafbfc; padding: 12px 20px; border-bottom: 1px solid #edf2f7; display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; padding: 20px; }
        .item-strip { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #f1f5f9; font-size: 12px; }
        .img-mini { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; background: #eee; }
        .badge { background: #dbeafe; color: #1e40af; padding: 3px 8px; border-radius: 4px; font-weight: 800; font-size: 10px; }
        .btn-sm { padding: 5px 10px; border-radius: 4px; border: 1px solid #e2e8f0; background: white; cursor: pointer; font-size: 10px; font-weight: 700; }
    </style>
</head>
<body>

    <div id="authBox" class="box">
        <h2 style="color:#d4af37">DeStashe Admin</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn-black" onclick="login()">Sign In</button>
    </div>

    <div class="container" id="mainApp">
        <header style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h1>Command Center</h1>
            <button onclick="logout()" style="border:none; background:none; color:red; cursor:pointer;">Logout</button>
        </header>

        <div class="card">
            <div class="header">1. New Inventory Intake</div>
            <form id="iForm" class="form-grid">
                <div style="grid-column: span 2;"><label>Name</label><input type="text" id="iName" required></div>
                <div><label>Brand SKU</label><input type="text" id="iSku"></div>
                <div><label>Collection</label><input list="cols" id="iCol" required><datalist id="cols"></datalist></div>
                <div><label>Category</label><select id="iCat"><option>Ring</option><option>Necklace</option><option>Earrings</option><option>Bracelet</option><option>Stacks</option></select></div>
                <div><label>Rarity</label><select id="iRare"><option>Collection Piece</option><option>Unicorn</option><option>Bella</option><option>Lillian</option><option>Diamond</option></select></div>
                <div><label>Cost</label><input type="number" id="iCost" step="0.01"></div>
                <div><label>MSRP *</label><input type="number" id="iMSRP" step="0.01" required></div>
                <div style="grid-column: span 2;"><button type="button" class="btn-black" onclick="save()">+ Add to Vault</button></div>
            </form>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="card"><div class="header">2. Claimed (Unpaid)</div><div id="list-P"></div></div>
            <div class="card"><div class="header">3. Paid (Ready to Ship)</div><div id="list-S"></div></div>
            <div class="card" style="grid-column: span 2;"><div class="header">4. Available Merchandise Vault</div><div id="list-A"></div></div>
        </div>
    </div>

    <script>
        const URL = 'https://fnlgermttuaibfvmbite.supabase.co';
        const KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
        const COLLECTIONS = ["Originals 2024", "Originals 2025", "Jan Birthday", "Feb Birthday", "Mar Birthday", "Apr Birthday", "May Birthday", "Jun Birthday", "Jul Birthday", "Aug Birthday", "Sep Birthday", "Oct Birthday", "Nov Birthday", "Dec Birthday"];

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const res = await fetch(`${URL}/auth/v1/token?grant_type=password`, {
                method: 'POST',
                headers: { 'apikey': KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.access_token) {
                localStorage.setItem('sb-token', data.access_token);
                localStorage.setItem('sb-user', data.user.id);
                location.reload();
            } else { alert("Login Failed: " + data.error_description); }
        }

        function logout() { localStorage.clear(); location.reload(); }

        async function save() {
            const body = {
                ItemName: document.getElementById('iName').value,
                BrandSku: document.getElementById('iSku').value,
                ItemCategory: document.getElementById('iCat').value,
                Collection: document.getElementById('iCol').value,
                Rarity: document.getElementById('iRare').value,
                CostPrice: parseFloat(document.getElementById('iCost').value) || 0,
                ListedPrice: parseFloat(document.getElementById('iMSRP').value) || 0,
                Status: 'Available',
                user_id: localStorage.getItem('sb-user'),
                creator_handle: 'destashe'
            };
            const res = await fetch(`${URL}/rest/v1/InventoryHistory`, {
                method: 'POST',
                headers: { 'apikey': KEY, 'Authorization': `Bearer ${localStorage.getItem('sb-token')}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                body: JSON.stringify(body)
            });
            if (res.ok) { document.getElementById('iForm').reset(); refresh(); } else { alert("Save Failed"); }
        }

        async function refresh() {
            const res = await fetch(`${URL}/rest/v1/InventoryHistory?user_id=eq.${localStorage.getItem('sb-user')}&Status=neq.Closed&ItemName=neq.SYSTEM_STORE_STATUS&order=CreatedAt.desc`, {
                headers: { 'apikey': KEY, 'Authorization': `Bearer ${localStorage.getItem('sb-token')}` }
            });
            const data = await res.json();
            const divP = document.getElementById('list-P'), divS = document.getElementById('list-S'), divA = document.getElementById('list-A');
            divP.innerHTML = ""; divS.innerHTML = ""; divA.innerHTML = "";

            data.forEach(item => {
                const isPaid = (item.Status === 'Pending' && item.PaymentReceived);
                const html = `<div class="item-strip">
                    <div style="flex:1">
                        <strong>${item.ItemName}</strong><br>
                        <small>${item.BrandSku || 'No SKU'} | MSRP: $${item.ListedPrice}</small>
                    </div>
                    ${item.Status === 'Pending' ? `<div class="badge">Bag ${item.BagNumber}</div>` : ''}
                    <div style="display:flex; gap:5px;">
                        ${item.Status === 'Available' ? `<button class="btn-sm" onclick="act('${item.id}', 'claim')">Claim</button>` : ''}
                        ${item.Status === 'Pending' && !item.PaymentReceived ? `<button class="btn-sm" onclick="act('${item.id}', 'paid')">Paid?</button>` : ''}
                        ${item.Status === 'Pending' && item.PaymentReceived ? `<button class="btn-sm" onclick="act('${item.id}', 'ship')">Ship</button>` : ''}
                        <button class="btn-sm" style="color:red; border:none;" onclick="act('${item.id}', 'del')">×</button>
                    </div>
                </div>`;

                if (item.Status === 'Available') divA.innerHTML += html;
                else if (isPaid) divS.innerHTML += html;
                else divP.innerHTML += html;
            });
        }

        async function act(id, type) {
            let update = {};
            if (type === 'claim') {
                const h = prompt("Buyer:"), b = prompt("Bag #:");
                if (h && b) update = { Status: 'Pending', ClaimedBy: h, BagNumber: b, PaymentReceived: false };
            } else if (type === 'paid') {
                const p = prompt("Sale Price:");
                if (p) update = { PaymentReceived: true, SalePrice: parseFloat(p) };
            } else if (type === 'ship') {
                const t = prompt("Tracking:");
                if (t) update = { Status: 'Shipped', TrackingNumber: t };
            } else if (type === 'del') {
                if (!confirm("Delete?")) return;
                await fetch(`${URL}/rest/v1/InventoryHistory?id=eq.${id}`, { method: 'DELETE', headers: { 'apikey': KEY, 'Authorization': `Bearer ${localStorage.getItem('sb-token')}` } });
                return refresh();
            }

            if (Object.keys(update).length > 0) {
                await fetch(`${URL}/rest/v1/InventoryHistory?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': KEY, 'Authorization': `Bearer ${localStorage.getItem('sb-token')}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(update)
                });
                refresh();
            }
        }

        if (localStorage.getItem('sb-token')) {
            document.getElementById('authBox').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('cols').innerHTML = COLLECTIONS.map(c => `<option value="${c}">`).join('');
            refresh();
        }
    </script>
</body>
</html>
