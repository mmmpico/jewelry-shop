<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DeStashe Command Center - V43 Ironclad</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1e293b; --accent: #d4af37; --bg: #f4f7f9; --text: #334155; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .auth-screen { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        .container { max-width: 1300px; margin: auto; display: none; }
        label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; }
        input, select { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-size: 13px; transition: border 0.2s; }
        input:focus { border-color: var(--accent); outline: none; }
        .btn-black { background: var(--primary); color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 24px; border: 1px solid #eef2f6; overflow: hidden; }
        .header { background: #fafbfc; padding: 12px 20px; border-bottom: 1px solid #edf2f7; display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; padding: 20px; }
        .item-strip { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #f1f5f9; font-size: 12px; }
        .img-mini { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; background: #eee; }
        .badge { background: #dbeafe; color: #1e40af; padding: 3px 8px; border-radius: 4px; font-weight: 800; font-size: 10px; }
        .btn-sm { padding: 6px 12px; border-radius: 6px; border: 1px solid #e2e8f0; background: white; cursor: pointer; font-size: 10px; font-weight: 700; }
    </style>
</head>
<body>

    <div id="authBox" class="auth-screen">
        <h2 style="color:var(--accent); margin-bottom:10px;">DeStashe Admin</h2>
        <p style="font-size:12px; color:#64748b; margin-bottom:25px;">V43 Ironclad Secure Login</p>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn-black" onclick="handleAuth()">Sign In</button>
        <p id="errorLog" style="color:#ef4444; font-size:12px; margin-top:15px; display:none;"></p>
    </div>

    <div class="container" id="mainApp">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1 style="font-size:24px;">Command Center</h1>
            <button onclick="handleLogout()" style="border:none; background:none; color:#94a3b8; font-weight:bold; cursor:pointer; text-decoration:underline;">Log Out</button>
        </header>

        <div class="card">
            <div class="header">1. New Inventory Intake</div>
            <form id="intakeForm" class="form-grid">
                <div style="grid-column: span 2;"><label>Item Name *</label><input type="text" id="iName" required></div>
                <div><label>Brand SKU</label><input type="text" id="iSku" placeholder="e.g. BP-505"></div>
                <div><label>Category</label><select id="iCat">
                    <option>Ring</option><option>Necklace</option><option>Earrings</option><option>Bracelet</option><option>Stacks</option><option>Necklace Set</option><option>Earring Set</option><option>Set (Mixed)</option>
                </select></div>
                <div><label>Collection *</label><input list="cols" id="iCol" required placeholder="Select..."><datalist id="cols"></datalist></div>
                <div><label>Rarity</label><select id="iRare">
                    <option>Collection Piece</option><option>Unicorn</option><option>Rare Unicorn</option><option>Ultra Rare Unicorn</option><option>Bella</option><option>Lillian</option><option>Diamond</option>
                </select></div>
                <div><label>Cost Price</label><input type="number" id="iCost" step="0.01" value="0.00"></div>
                <div><label>MSRP (Listed) *</label><input type="number" id="iMSRP" step="0.01" required></div>
                <div style="grid-column: span 2;"><button type="button" class="btn-black" onclick="saveItem()">+ Add to Vault</button></div>
            </form>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 24px;">
            <div class="card"><div class="header">2. Claimed (Unpaid)</div><div id="list-Claimed"></div></div>
            <div class="card"><div class="header">3. Paid (Ready to Ship)</div><div id="list-Paid"></div></div>
            <div class="card" style="grid-column: span 2;"><div class="header">4. Available Merchandise Vault</div><div id="list-Available"></div></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://fnlgermttuaibfvmbite.supabase.co';
        const SB_KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
        const COLLECTIONS = ["Originals 2023", "Originals 2024", "Originals 2025", "Originals 2026", "Spring Stacks", "Summer Stacks", "Fall Stacks", "Wicked", "Holiday Stacks", "Sterling Club", "Elevated Elegance", "Jan Birthday", "Feb Birthday", "Mar Birthday", "Apr Birthday", "May Birthday", "Jun Birthday", "Jul Birthday", "Aug Birthday", "Sep Birthday", "Oct Birthday", "Nov Birthday", "Dec Birthday"];
        
        let _sb;

        window.onload = function() {
            _sb = supabase.createClient(SB_URL, SB_KEY);
            // Persistent Session Check
            _sb.auth.onAuthStateChange((event, session) => {
                if (session) showApp(); else showLogin();
            });
        };

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const { error } = await _sb.auth.signInWithPassword({ email, password: pass });
            if (error) {
                const errBox = document.getElementById('errorLog');
                errBox.innerText = error.message;
                errBox.style.display = 'block';
            }
        }

        async function handleLogout() { await _sb.auth.signOut(); }

        function showApp() {
            document.getElementById('authBox').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('cols').innerHTML = COLLECTIONS.map(c => `<option value="${c}">`).join('');
            refreshData();
        }

        function showLogin() {
            document.getElementById('authBox').style.display = 'block';
            document.getElementById('mainApp').style.display = 'none';
        }

        async function saveItem() {
            const btn = event.target;
            btn.innerText = "SAVING..."; btn.disabled = true;
            
            const { data: { user } } = await _sb.auth.getUser();
            const payload = {
                ItemName: document.getElementById('iName').value,
                BrandSku: document.getElementById('iSku').value,
                ItemCategory: document.getElementById('iCat').value,
                Collection: document.getElementById('iCol').value,
                Rarity: document.getElementById('iRare').value,
                CostPrice: parseFloat(document.getElementById('iCost').value) || 0,
                ListedPrice: parseFloat(document.getElementById('iMSRP').value) || 0,
                Status: 'Available',
                user_id: user.id,
                creator_handle: 'destashe'
            };

            const { error } = await _sb.from('InventoryHistory').insert([payload]);
            if (error) {
                alert("Error saving: " + error.message);
                btn.innerText = "+ Add to Vault"; btn.disabled = false;
            } else {
                document.getElementById('intakeForm').reset();
                btn.innerText = "+ Add to Vault"; btn.disabled = false;
                refreshData();
            }
        }

        async function refreshData() {
            const { data: { user } } = await _sb.auth.getUser();
            const { data } = await _sb.from('InventoryHistory')
                .select('*')
                .eq('user_id', user.id)
                .neq('Status', 'Closed')
                .neq('ItemName', 'SYSTEM_STORE_STATUS')
                .order('CreatedAt', { ascending: false });

            const divA = document.getElementById('list-Available');
            const divC = document.getElementById('list-Claimed');
            const divP = document.getElementById('list-Paid');
            divA.innerHTML = ""; divC.innerHTML = ""; divP.innerHTML = "";

            data?.forEach(item => {
                const isPaid = (item.Status === 'Pending' && item.PaymentReceived);
                const html = `<div class="item-strip">
                    <div style="flex:1">
                        <strong>${item.ItemName}</strong><br>
                        <small>${item.BrandSku || 'No SKU'} | ${item.Collection} | MSRP: $${item.ListedPrice}</small>
                    </div>
                    ${item.Status === 'Pending' ? `<div class="badge">Bag ${item.BagNumber}</div><div style="font-size:10px; margin-left:8px;">@${item.ClaimedBy}</div>` : ''}
                    <div style="display:flex; gap:6px;">
                        ${item.Status === 'Available' ? `<button class="btn-sm" onclick="workflow('${item.id}', 'claim')">Claim</button>` : ''}
                        ${item.Status === 'Pending' && !item.PaymentReceived ? `<button class="btn-sm" onclick="workflow('${item.id}', 'paid')">Paid?</button>` : ''}
                        ${item.Status === 'Pending' && item.PaymentReceived ? `<button class="btn-sm" onclick="workflow('${item.id}', 'ship')">Ship</button>` : ''}
                        <button class="btn-sm" style="color:#ef4444; border:none;" onclick="workflow('${item.id}', 'del')">×</button>
                    </div>
                </div>`;

                if (item.Status === 'Available') divA.innerHTML += html;
                else if (isPaid) divP.innerHTML += html;
                else divC.innerHTML += html;
            });
        }

        async function workflow(id, action) {
            if (action === 'claim') {
                const h = prompt("Buyer Handle:");
                const b = prompt("Bag #:");
                if (h && b) await _sb.from('InventoryHistory').update({ Status: 'Pending', ClaimedBy: h, BagNumber: b, PaymentReceived: false }).eq('id', id);
            } else if (action === 'paid') {
                const p = prompt("Final Sale Price:");
                if (p) await _sb.from('InventoryHistory').update({ PaymentReceived: true, SalePrice: parseFloat(p) }).eq('id', id);
            } else if (action === 'ship') {
                const t = prompt("Tracking #:");
                if (t) await _sb.from('InventoryHistory').update({ Status: 'Shipped', TrackingNumber: t }).eq('id', id);
            } else if (action === 'del') {
                if (confirm("Delete this item permanently?")) await _sb.from('InventoryHistory').delete().eq('id', id);
            }
            refreshData();
        }
    </script>
</body>
</html>
