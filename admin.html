<!DOCTYPE html>
<html>
<head>
    <title>DeStashe Admin - Master Inventory Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfbfb; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; }
        
        /* AUTH BOX */
        #authContainer { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; }
        .auth-btn { width: 100%; padding: 12px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .auth-btn:hover { background: #d4af37; }

        /* LIVE STATUS PANEL */
        .live-panel { background: #f4f4f4; border: 2px solid #ddd; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 30px; transition: 0.3s; }
        .live-panel.is-live { background: #fff5f5; border-color: #ff4d4d; box-shadow: 0 0 15px rgba(255, 77, 77, 0.2); }
        .btn-live { background: #222; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .live-panel.is-live .btn-live { background: #ff4d4d; }

        /* FORM GRID */
        .row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .row div { flex: 1; min-width: 200px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #888; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .save-btn { width: 100%; padding: 18px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; text-transform: uppercase; }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; font-size: 13px; }
        th { color: #999; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        img.thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<div id="authContainer">
    <h2 style="color:#d4af37">Creator Login</h2>
    <div id="authError" style="color:red; margin-bottom:10px; font-size: 12px;"></div>
    <input type="email" id="loginEmail" class="auth-input" placeholder="Email Address">
    <input type="password" id="loginPassword" class="auth-input" placeholder="Password">
    <button class="auth-btn" onclick="signInUser()">Log In</button>
</div>

<div class="container" id="appContainer">

        <h1>Inventory Manager</h1>
        <button onclick="supabase.auth.signOut().then(() => location.reload())" style="cursor:pointer; border:none; background:none; color:#888;">Log Out</button>
    </div>
