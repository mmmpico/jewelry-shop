<!DOCTYPE html>
<html>
<head>
    <title>DeStashe Admin - Master Inventory</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfbfb; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* AUTH SECTION */
        #authContainer { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .auth-btn { width: 100%; padding: 12px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; width: 100%; }
        
        /* LIVE PANEL */
        .live-panel { background: #f4f4f4; border: 2px solid #ddd; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 30px; transition: 0.3s; }
        .live-panel.is-live { background: #fff5f5; border-color: #ff4d4d; box-shadow: 0 0 15px rgba(255, 77, 77, 0.2); }
        .live-status-text { font-size: 14px; font-weight: bold; text-transform: uppercase; color: #666; letter-spacing: 2px; margin-bottom: 10px; }
        .live-panel.is-live .live-status-text { color: #ff4d4d; }
        .btn-live { background: #222; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .live-panel.is-live .btn-live { background: #ff4d4d; }

        /* FORM STYLES */
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .row div { flex: 1; min-width: 200px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #888; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .save-btn { width: 100%; padding: 18px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; text-transform: uppercase; }
        .save-btn:hover { background: #d4af37; }

        /* TABLE STYLES */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; font-size: 12px; }
        th { background: #f9f9f9; color: #999; text-transform: uppercase; font-size: 10px; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        img.thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

<div id="authContainer">
    <h2 style="color:#d4af37">Creator Login</h2>
    <input type="email" id="authEmail" class="auth-input" placeholder="Email Address">
    <input type="password" id="authPassword" class="auth-input" placeholder="Password">
    <button class="auth-btn" onclick="handleLogin()">Log In</button>
</div>

<div class="container" id="appContainer" style="display: none;">
    <div class="admin-header">
        <h1>Inventory Manager</h1>
        <button onclick="handleLogout()" style="padding:8px 15px; cursor:pointer; border-radius:5px; border:1px solid #ddd;">Log Out</button>
    </div>

    <div class="live-panel" id="livePanel">
        <div class="live-status-text" id="liveStatusText">Store Status: OFFLINE</div>
        <button class="btn-live" onclick="toggleLiveStatus()">Toggle Live Status</button>
    </div>

    <div class="form-section">
        <div class="row">
            <div style="flex: 2;"><label>Item Name</label><input type
