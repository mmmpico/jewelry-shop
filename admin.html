<!DOCTYPE html>
<html>
<head>
    <title>DeStashe Admin - Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://fnlgermttuaibfvmbite.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
        var _sb;

        // FIXED LISTS (Locked Dropdowns)
        const CATEGORIES = ["Ring", "Necklace", "Earrings", "Bracelet", "Stacks", "Set (Mixed)"];
        const PLATING = ["Gold", "Rose Gold", "Rhodium", "Silver", "Hematite", "Mixed"];
        const RARITY = ["Collection Piece", "Unicorn", "Rare Unicorn", "Diamonds"];
        const COLLECTIONS = ["Originals 2024", "Spring Stacks 2024", "Summer Stacks 2024", "Fall Stacks 2024", "Wicked 2024", "Holiday Stacks 2024", "Originals 2025", "January 2025 Birthday", "February 2025 Birthday"];

        window.onload = function() {
            _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            _sb.auth.onAuthStateChange((event, session) => {
                if (session) {
                    document.getElementById('authBox').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    renderDropdowns();
                    loadItems();
                } else {
                    document.getElementById('authBox').style.display = 'block';
                    document.getElementById('mainApp').style.display = 'none';
                }
            });
        };

        function renderDropdowns() {
            fillSelect('ItemCategory', CATEGORIES);
            fillSelect('Plating', PLATING);
            fillSelect('Rarity', RARITY);
            
            const list = document.getElementById('cols');
            list.innerHTML = "";
            COLLECTIONS.forEach(c => { let o = document.createElement('option'); o.value = c; list.appendChild(o); });
        }

        function fillSelect(id, list) {
            const el = document.getElementById(id);
            el.innerHTML = list.map(item => `<option value="${item}">${item}</option>`).join('');
        }

        async function doLogin() {
            const btn = document.getElementById('loginBtn');
            btn.innerText = "Authenticating...";
            const { error } = await _sb.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('pass').value
            });
            if (error) { alert(error.message); btn.innerText = "Log In"; }
        }

        async function uploadItem() {
            const form = document.getElementById('inventoryForm');
            if (!form.checkValidity()) {
                alert("Please fill in all required fields (Name, Cost, Retail, and Collection).");
                return;
            }

            const btn = document.getElementById('saveBtn');
            btn.innerText = "SAVING TO DATABASE...";
            btn.disabled = true;

            const file = document.getElementById('ItemImage').files[0];
            let url = "https://via.placeholder.com/150"; // Default if no photo

            if (file) {
                const name = `img-${Date.now()}`;
                await _sb.storage.from('jewelry-photos').upload(name, file);
                const { data } = _sb.storage.from('jewelry-photos').getPublicUrl(name);
                url = data.publicUrl;
            }

            const { data: { user } } = await _sb.auth.getUser();

            const { error } = await _sb.from('InventoryHistory').insert([{
                ItemName: document.getElementById('ItemName').value,
                ItemCategory: document.getElementById('ItemCategory').value,
                Collection: document.getElementById('Collection').value,
                Plating: document.getElementById('Plating').value,
                Rarity: document.getElementById('Rarity').value,
                Stone: document.getElementById('Stone').value,
                PurchasePrice: parseFloat(document.getElementById('PurchasePrice').value),
                Price: parseFloat(document.getElementById('Price').value),
                image_url: url,
                Status: 'Available', // Visible on site
                user_id: user.id,
                creator_handle: 'destashe' // We will automate this next
            }]);

            if (error) { alert(error.message); btn.disabled = false; btn.innerText = "Add to Collection"; }
            else { location.reload(); }
        }

        async function markAsSold(id) {
            if (confirm("Mark as Sold? (It will be archived but saved in your history)")) {
                await _sb.from('InventoryHistory').update({ Status: 'Sold' }).eq('id', id);
                location.reload();
            }
        }

        async function loadItems() {
            const { data: { user } } = await _sb.auth.getUser();
            const { data } = await _sb.from('InventoryHistory')
                .select('*')
                .eq('user_id', user.id)
                .eq('Status', 'Available') // Only show active items in the manager
                .order('CreatedAt', { ascending: false });

            const tbody = document.querySelector('#inventoryTable tbody');
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td><img src="${item.image_url}" class="thumb"></td>
                    <td><strong>${item.ItemName}</strong><br><small>${item.Stone || ''}</small></td>
                    <td>${item.Collection}</td>
                    <td>$${item.PurchasePrice} / $${item.Price}</td>
                    <td>
                        <button onclick="markAsSold('${item.id}')" style="background:#4CAF50; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer;">Mark Sold</button>
                    </td>
                </tr>
            `).join('');
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfbfb; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; }
        #authBox { max-width: 400px; margin: 100px auto; text-align: center; background:white; padding:40px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.1); }
        .auth-input, input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .auth-btn, .save-btn { width: 100%; padding: 15px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .row { display: flex; gap: 15px; margin-bottom: 10px; flex-wrap: wrap; }
        .row div { flex: 1; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #999; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        .thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        /* Required field styling */
        input:invalid { border-color: #ff4d4d; }
    </style>
</head>
<body>

<div id="authBox">
    <h2 style="color:#d4af37">Creator Login</h2>
    <input type="email" id="email" class="auth-input" placeholder="Email">
    <input type="password" id="pass" class="auth-input" placeholder="Password">
    <button id="loginBtn" class="auth-btn" onclick="doLogin()">Log In</button>
</div>

<div class="container" id="mainApp">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1>Inventory Manager</h1>
        <button onclick="_sb.auth.signOut().then(()=>location.reload())" style="background:none; border:none; color:#999; cursor:pointer;">Log Out</button>
    </div>

    <form id="inventoryForm">
        <div class="row">
            <div style="flex: 2;"><label>Item Name *</label><input type="text" id="ItemName" required></div>
            <div><label>Category</label><select id="ItemCategory"></select></div>
            <div><label>Collection *</label><input list="cols" id="Collection" required><datalist id="cols"></datalist></div>
        </div>

        <div class="row">
            <div><label>Plating</label><select id="Plating"></select></div>
            <div style="flex: 1.5;"><label>Stone</label><input type="text" id="Stone"></div>
            <div><label>Rarity</label><select id="Rarity"></select></div>
        </div>

        <div class="row">
            <div><label>Cost ($) *</label><input type="number" id="PurchasePrice" step="0.01" required></div>
            <div><label>Retail ($) *</label><input type="number" id="Price" step="0.01" required></div>
            <div><label>Photo</label><input type="file" id="ItemImage"></div>
        </div>
        
        <button type="button" id="saveBtn" class="save-btn" onclick="uploadItem()">Add to Collection</button>
    </form>

    <table id="inventoryTable">
        <thead><tr><th>Photo</th><th>Item</th><th>Collection</th><th>Cost/Retail</th><th>Action</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

</body>
</html>
