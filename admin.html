<!DOCTYPE html>
<html>
<head>
    <title>DeStashe Command Center - Master Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f9; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 1400px; margin: auto; display: none; }
        #authBox { max-width: 400px; margin: 100px auto; text-align: center; background:white; padding:40px; border-radius:16px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .auth-input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 15px; background: #1e293b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 24px; border: 1px solid #eef2f6; overflow: hidden; }
        .station-header { background: #fafbfc; padding: 15px 20px; border-bottom: 1px solid #edf2f7; display: flex; justify-content: space-between; align-items: center; }
        .station-header h3 { margin: 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; font-weight: 800; }
        .intake-body { padding: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 15px; }
        label { font-size: 10px; font-weight: 700; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; width: 100%; box-sizing: border-box; background: #fcfdfe; }
        .btn-main { background: #1e293b; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .item-strip { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #f1f5f9; font-size: 12px; }
        .img-mini { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; background: #f1f5f9; border: 1px solid #eee; }
        .btn-action { padding: 6px 12px; border-radius: 4px; border: 1px solid #e2e8f0; cursor: pointer; font-size: 10px; font-weight: 700; background: white; }
    </style>
</head>
<body>

<div id="authBox">
    <h2 style="color:#d4af37; margin-bottom:20px;">DeStashe Admin</h2>
    <input type="email" id="email" class="auth-input" placeholder="Email Address">
    <input type="password" id="pass" class="auth-input" placeholder="Password">
    <button class="btn-login" onclick="doSignIn()">Sign In</button>
    <p id="authMsg" style="color:red; font-size:12px; margin-top:10px; display:none;"></p>
</div>

<div class="container" id="mainApp">
    <header style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
        <h1>Command Center</h1>
        <button onclick="doSignOut()" style="background:none; border:none; color:#94a3b8; cursor:pointer; font-weight:bold;">Log Out</button>
    </header>

    <div class="card">
        <div class="station-header"><h3>1. Inventory Intake</h3></div>
        <div class="intake-body">
            <form id="inventoryForm">
                <div class="form-grid">
                    <div style="grid-column: span 2;"><label>Item Name *</label><input type="text" id="ItemName" required></div>
                    <div><label>SKU / ID</label><input type="text" id="SKU" placeholder="BP-101"></div>
                    <div><label>Category</label><select id="ItemCategory">
                        <option>Ring</option><option>Necklace</option><option>Earrings</option><option>Bracelet</option><option>Stacks</option><option>Necklace Set</option><option>Earring Set</option><option>Set (Mixed)</option>
                    </select></div>
                    <div><label>Collection *</label><input list="cols" id="Collection" required><datalist id="cols"></datalist></div>
                </div>
                <div class="form-grid">
                    <div><label>Plating</label><select id="Plating">
                        <option>Gold</option><option>Rose Gold</option><option>Rhodium</option><option>Silver</option><option>Hematite</option><option>Mixed</option>
                    </select></div>
                    <div><label>Stone</label><input type="text" id="Stone"></div>
                    <div><label>Rarity</label><select id="Rarity">
                        <option>Collection Piece</option><option>Unicorn</option><option>Rare Unicorn</option><option>Ultra Rare Unicorn</option><option>Bella</option><option>Lillian</option><option>Diamond</option>
                    </select></div>
                    <div><label>CostPrice (Cost)</label><input type="number" id="CostPrice" step="0.01"></div>
                    <div><label>ListedPrice (Retail) *</label><input type="number" id="ListedPrice" step="0.01" required></div>
                    <div><label>Set Count</label><input type="number" id="SetCount" value="1"></div>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; border-top: 1px solid #f1f5f9; padding-top:15px; margin-top:10px;">
                    <input type="file" id="ItemImage" accept="image/*">
                    <button type="button" class="btn-main" id="saveBtn" onclick="uploadItem()">+ Add to Vault</button>
                </div>
            </form>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="card"><div class="station-header"><h3>2. Claimed (Unpaid)</h3></div><div id="list-pending"></div></div>
        <div class="card"><div class="station-header"><h3>3. Paid (Ready to Ship)</h3></div><div id="list-paid"></div></div>
        <div class="card" style="grid-column: span 2;"><div class="station-header"><h3>4. Available Merchandise</h3></div><div id="list-available"></div></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://fnlgermttuaibfvmbite.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
    const COLLECTIONS = ["Originals 2023", "Originals 2024", "Originals 2025", "Originals 2026", "Spring Stacks", "Summer Stacks", "Fall Stacks", "Wicked", "Holiday Stacks", "Sterling Club", "Elevated Elegance", "Jan Birthday", "Feb Birthday", "Mar Birthday", "Apr Birthday", "May Birthday", "Jun Birthday", "Jul Birthday", "Aug Birthday", "Sep Birthday", "Oct Birthday", "Nov Birthday", "Dec Birthday"];
    
    let _sb;
    const NO_IMG = "https://via.placeholder.com/150?text=No+Photo";

    window.onload = function() {
        _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        checkUser();
    };

    async function checkUser() {
        const { data: { session } } = await _sb.auth.getSession();
        if (session) {
            document.getElementById('authBox').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('cols').innerHTML = COLLECTIONS.map(c => `<option value="${c}">`).join('');
            loadEverything();
        } else {
            document.getElementById('authBox').style.display = 'block';
            document.getElementById('mainApp').style.display = 'none';
        }
    }

    async function doSignIn() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const msg = document.getElementById('authMsg');
        const { error } = await _sb.auth.signInWithPassword({ email, password: pass });
        if (error) {
            msg.innerText = error.message; msg.style.display = 'block';
        } else {
            location.reload();
        }
    }

    async function doSignOut() { await _sb.auth.signOut(); location.reload(); }

    async function uploadItem() {
        const btn = document.getElementById('saveBtn');
        const form = document.getElementById('inventoryForm');
        
        if (!form.checkValidity()) return alert("Check required fields!");
        
        btn.innerText = "Processing Image..."; btn.disabled = true;

        let finalUrl = "";
        const file = document.getElementById('ItemImage').files[0];
        
        try {
            if (file) {
                const fileExt = file.name.split('.').pop();
                const fileName = `img-${Date.now()}.${fileExt}`;
                
                // 1. UPLOAD
                const { data: uploadData, error: uploadErr } = await _sb.storage
                    .from('jewelry-photos')
                    .upload(fileName, file);
                
                if (uploadErr) throw uploadErr;

                // 2. GET URL
                const { data: urlData } = _sb.storage
                    .from('jewelry-photos')
                    .getPublicUrl(fileName);
                
                finalUrl = urlData.publicUrl;
            }

            // 3. SAVE TO DATABASE
            btn.innerText = "Saving Data...";
            const { data: { user } } = await _sb.auth.getUser();
            const { error: dbErr } = await _sb.from('InventoryHistory').insert([{
                ItemName: document.getElementById('ItemName').value,
                SKU: document.getElementById('SKU').value,
                ItemCategory: document.getElementById('ItemCategory').value,
                Collection: document.getElementById('Collection').value,
                Plating: document.getElementById('Plating').value,
                Rarity: document.getElementById('Rarity').value,
                Stone: document.getElementById('Stone').value,
                CostPrice: parseFloat(document.getElementById('CostPrice').value) || 0,
                ListedPrice: parseFloat(document.getElementById('ListedPrice').value) || 0,
                SetCount: parseInt(document.getElementById('SetCount').value) || 1,
                image_url: finalUrl,
                Status: 'Available',
                user_id: user.id,
                creator_handle: 'destashe'
            }]);

            if (dbErr) throw dbErr;
            location.reload();

        } catch (err) {
            alert("Upload Failed: " + err.message);
            btn.disabled = false;
            btn.innerText = "+ Add to Vault";
        }
    }

    async function loadEverything() {
        const { data: { user } } = await _sb.auth.getUser();
        const { data } = await _sb.from('InventoryHistory')
            .select('*')
            .eq('user_id', user.id)
            .neq('ItemName', 'SYSTEM_STORE_STATUS')
            .neq('Status','Closed')
            .order('CreatedAt', { ascending: false });
        
        const divP = document.getElementById('list-pending');
        const divS = document.getElementById('list-paid');
        const divA = document.getElementById('list-available');
        divP.innerHTML = ""; divS.innerHTML = ""; divA.innerHTML = "";

        const now = new Date();
        data?.forEach(item => {
            const diff = Math.floor((now - new Date(item.CreatedAt)) / 60000);
            const canDel = (item.Status === 'Available' && diff < 60);
            const img = item.image_url || NO_IMG;
            
            const html = `<div class="item-strip">
                <img src="${img}" class="img-mini" onerror="this.src='${NO_IMG}'">
                <div style="flex:1"><strong>${item.ItemName}</strong><br><small>${item.SKU || 'No SKU'} | $${item.ListedPrice}</small></div>
                <div style="display:flex; gap:5px; align-items:center;">
                    ${item.Status === 'Available' ? `<button class="btn-action" onclick="claim('${item.id}')">Claim</button>` : ''}
                    ${item.Status === 'Pending' && !item.PaymentReceived ? `<button class="btn-action" onclick="markPaid('${item.id}')">Paid?</button>` : ''}
                    ${item.Status === 'Pending' && item.PaymentReceived ? `<button class="btn-action" onclick="ship('${item.id}')">Ship</button>` : ''}
                    ${canDel ? `<button onclick="deleteItem('${item.id}')" style="color:red; border:none; background:none; cursor:pointer; font-size:18px;">×</button>` : ''}
                </div>
            </div>`;
            if (item.Status === 'Available') divA.innerHTML += html;
            else if (item.Status === 'Pending' && !item.PaymentReceived) divP.innerHTML += html;
            else if (item.Status === 'Pending' && item.PaymentReceived) divS.innerHTML += html;
        });
    }

    async function claim(id) {
        const h = prompt("Buyer Social:"); const b = prompt("Bag #:");
        if (h && b) await _sb.from('InventoryHistory').update({ Status: 'Pending', ClaimedBy: h, BagNumber: b, PaymentReceived: false }).eq('id', id);
        location.reload();
    }

    async function markPaid(id) {
        const p = prompt("Final Sale Price:");
        if (p) await _sb.from('InventoryHistory').update({ PaymentReceived: true, SalePrice: parseFloat(p) }).eq('id', id);
        location.reload();
    }

    async function ship(id) {
        const t = prompt("Tracking #:");
        if (t) await _sb.from('InventoryHistory').update({ Status: 'Shipped', TrackingNumber: t }).eq('id', id);
        location.reload();
    }

    async function deleteItem(id) { if (confirm("Delete?")) { await _sb.from('InventoryHistory').delete().eq('id', id); location.reload(); } }
</script>
</body>
</html>
