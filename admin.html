<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DeStashe Command Center - V62 Modular</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* --- [1. STYLE MODULE: THE LOOK] --- */
        :root { --slate: #1e293b; --gold: #d4af37; --bg: #f8fafc; --border: #e2e8f0; --success: #22c55e; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: #334155; margin: 0; padding: 20px; }
        .auth-card { max-width: 400px; margin: 80px auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; border: 1px solid var(--border); }
        .container { max-width: 1400px; margin: auto; display: none; }
        .nav-bar { background: var(--slate); color: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .scan-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 6px; width: 300px; outline: none; }
        .card { background: white; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 24px; overflow: hidden; }
        .header { background: #f1f5f9; padding: 12px 20px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 800; text-transform: uppercase; color: #64748b; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; padding: 20px; }
        label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; }
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 13px; }
        .btn-main { background: var(--slate); color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; text-transform: uppercase; }
        .btn-sm { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: white; cursor: pointer; font-size: 10px; font-weight: 700; }
        .item-row { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #f1f5f9; font-size: 12px; transition: 0.3s; }
        .badge-set { background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 4px; font-weight: 800; font-size: 10px; }
        .badge-bag { background: #fef3c7; color: #92400e; padding: 2px 6px; border-radius: 4px; font-weight: 800; font-size: 10px; }
    </style>
</head>
<body>

    <div id="authBox" class="auth-card">
        <h2 style="color:var(--gold)">DeStashe Admin</h2>
        <input type="email" id="email" placeholder="Email Address" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
        <input type="password" id="pass" placeholder="Password" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd;">
        <button class="btn-main" id="loginBtn">Sign In</button>
    </div>

    <div class="container" id="mainApp">
        <div class="nav-bar">
            <div style="display:flex; align-items:center; gap:15px;">
                <strong>SCANNER MODE</strong>
                <input type="checkbox" id="scannerToggle">
                <input type="text" id="globalSearch" placeholder="Zap SKU..." class="scan-input">
            </div>
            <button onclick="DS_CORE.logout()" style="color:white; background:none; border:none; cursor:pointer; font-weight:bold;">Log Out</button>
        </div>

        <div class="card">
            <div class="header">1. New Inventory Intake</div>
            <form id="iForm" class="form-grid">
                <div style="grid-column: span 2;"><label>Item Name *</label><input type="text" id="iName" required></div>
                <div><label>Brand SKU</label><input type="text" id="iSku" placeholder="BP-123"></div>
                <div><label>Category</label><select id="iCat"></select></div> <div><label>Collection *</label><input list="cols" id="iCol" required><datalist id="cols"></datalist></div>
                <div><label>Rarity</label><select id="iRare"></select></div> <div><label>Set Pieces</label><input type="number" id="iSet" value="1"></div>
                <div><label>CostPrice</label><input type="number" id="iCost" step="0.01"></div>
                <div><label>ListedPrice (MSRP) *</label><input type="number" id="iMSRP" step="0.01" required></div>
                <div style="grid-column: span 2;"><button type="button" class="btn-main" onclick="DS_CORE.saveItem()">+ Save to Vault</button></div>
            </form>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="card"><div class="header">2. Claimed (Unpaid)</div><div id="list-P"></div></div>
            <div class="card"><div class="header">3. Paid (Ready to Ship)</div><div id="list-S"></div></div>
            <div class="card" style="grid-column: span 2;"><div class="header">4. Merchandise Vault</div><div id="list-A"></div></div>
        </div>
    </div>

    <script>
        /* --- [4. DATA MODULE: THE DROPDOWNS] --- */
        const DS_DATA = {
            collections: ["Originals 2024", "Originals 2025", "Originals 2026", "January 2025 Birthday", "February 2025 Birthday", "March 2025 Birthday", "April 2025 Birthday", "May 2025 Birthday", "June 2025 Birthday", "July 2025 Birthday", "August 2025 Birthday", "September 2025 Birthday", "October 2025 Birthday", "November 2025 Birthday", "December 2025 Birthday", "Spring Stacks", "Summer Stacks", "Wicked", "Holiday Stacks"],
            categories: ["Ring", "Necklace", "Earrings", "Bracelet", "Stacks", "Necklace Set", "Earring Set", "Set (Mixed)", "Stacks (Mixed)"],
            rarities: ["Collection Piece", "Unicorn", "Rare Unicorn", "Ultra Rare", "Bella", "Lillian", "Diamond"]
        };

        /* --- [5. CORE ENGINE: DATABASE LOGIC] --- */
        const DS_CORE = {
            url: 'https://fnlgermttuaibfvmbite.supabase.co',
            key: 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc',
            db: null,

            init: function() {
                if (typeof supabase === 'undefined') return setTimeout(this.init.bind(this), 300);
                this.db = supabase.createClient(this.url, this.key);
                this.db.auth.onAuthStateChange((evt, session) => {
                    if (session) this.launchApp(); else this.launchAuth();
                });
            },

            launchAuth: () => {
                document.getElementById('authBox').style.display = 'block';
                document.getElementById('mainApp').style.display = 'none';
            },

            launchApp: function() {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                // Populate Dropdowns from Data Module
                document.getElementById('iCat').innerHTML = DS_DATA.categories.map(c => `<option>${c}</option>`).join('');
                document.getElementById('iRare').innerHTML = DS_DATA.rarities.map(r => `<option>${r}</option>`).join('');
                document.getElementById('cols').innerHTML = DS_DATA.collections.map(c => `<option value="${c}">`).join('');
                this.refresh();
            },

            login: async function() {
                const e = document.getElementById('email').value, p = document.getElementById('pass').value;
                const { error } = await this.db.auth.signInWithPassword({ email: e, password: p });
                if (error) alert(error.message);
            },

            logout: async function() { await this.db.auth.signOut(); location.reload(); },

            saveItem: async function() {
                const { data: { user } } = await this.db.auth.getUser();
                const item = {
                    ItemName: document.getElementById('iName').value,
                    BrandSku: document.getElementById('iSku').value,
                    ItemCategory: document.getElementById('iCat').value,
                    Collection: document.getElementById('iCol').value,
                    Rarity: document.getElementById('iRare').value,
                    SetCount: parseInt(document.getElementById('iSet').value) || 1,
                    CostPrice: parseFloat(document.getElementById('iCost').value) || 0,
                    ListedPrice: parseFloat(document.getElementById('iMSRP').value) || 0,
                    Status: 'Available', user_id: user.id
                };
                const { error } = await this.db.from('InventoryHistory').insert([item]);
                if (!error) { document.getElementById('iForm').reset(); this.refresh(); }
            },

            refresh: async function() {
                const { data: { user } } = await this.db.auth.getUser();
                const { data } = await this.db.from('InventoryHistory').select('*').eq('user_id', user.id).neq('Status','Closed').order('CreatedAt', { ascending: false });
                
                const divP = document.getElementById('list-P'), divS = document.getElementById('list-S'), divA = document.getElementById('list-A');
                divP.innerHTML = divS.innerHTML = divA.innerHTML = "";

                data?.forEach(item => {
                    const isPaid = (item.Status === 'Pending' && item.PaymentReceived);
                    const html = `<div class="item-row" id="sku-${item.BrandSku}">
                        <div style="flex:1">
                            <strong>${item.ItemName}</strong> ${item.SetCount > 1 ? `<span class="badge-set">SET: ${item.SetCount}</span>` : ''} <br>
                            <small>${item.BrandSku || 'NO SKU'} | MSRP: $${item.ListedPrice}</small>
                        </div>
                        ${item.Status === 'Pending' ? `<div class="badge-bag">Bag ${item.BagNumber}</div><div style="font-size:10px; margin:0 10px;">@${item.ClaimedBy}</div>` : ''}
                        <div style="display:flex; gap:5px;">
                            ${item.Status === 'Available' ? `<button class="btn-sm" onclick="DS_CORE.action('${item.id}', 'claim')">Claim</button>` : ''}
                            ${item.Status === 'Pending' && !item.PaymentReceived ? `<button class="btn-sm" onclick="DS_CORE.action('${item.id}', 'paid')">Paid?</button>` : ''}
                            ${item.Status === 'Pending' && item.PaymentReceived ? `<button class="btn-sm" onclick="DS_CORE.action('${item.id}', 'ship')">Ship</button>` : ''}
                            <button class="btn-sm" style="color:red;" onclick="DS_CORE.action('${item.id}', 'del')">×</button>
                        </div>
                    </div>`;
                    if (item.Status === 'Available') divA.innerHTML += html; else if (isPaid) divS.innerHTML += html; else divP.innerHTML += html;
                });
            },

            action: async function(id, type) {
                let upd = {};
                if (type === 'claim') {
                    const h = prompt("Buyer Social:"), b = prompt("Bag #:");
                    if (h && b) upd = { Status: 'Pending', ClaimedBy: h, BagNumber: b, PaymentReceived: false };
                } else if (type === 'paid') {
                    const p = prompt("Final Sale Price:");
                    if (p) upd = { PaymentReceived: true, SalePrice: parseFloat(p) };
                } else if (type === 'ship') {
                    const t = prompt("Tracking #:");
                    if (t) upd = { Status: 'Shipped', TrackingNumber: t };
                } else if (type === 'del') {
                    if (confirm("Delete?")) { await this.db.from('InventoryHistory').delete().eq('id', id); this.refresh(); return; }
                }
                if (Object.keys(upd).length > 0) { await this.db.from('InventoryHistory').update(upd).eq('id', id); this.refresh(); }
            }
        };

        // --- [6. EVENT LISTENERS] ---
        document.getElementById('loginBtn').addEventListener('click', () => DS_CORE.login());
        document.getElementById('globalSearch').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('scannerToggle').checked) {
                const target = document.getElementById(`sku-${e.target.value}`);
                if (target) { target.style.background = "#fff9c4"; target.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                e.target.value = "";
            }
        });

        // START ENGINE
        DS_CORE.init();
    </script>
</body>
</html>
