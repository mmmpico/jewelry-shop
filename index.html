<!DOCTYPE html>
<html>
<head>
    <title>Heather's Jewelry Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: serif; text-align: center; background: #fffafb; padding: 20px; }
        .nav, .search-container { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        
        /* Search Input Style */
        #searchInput { padding: 12px; width: 80%; max-width: 400px; border: 1px solid #d4af37; border-radius: 25px; outline: none; font-size: 16px; }
        
        button { padding: 10px 20px; border: 1px solid #d4af37; background: white; cursor: pointer; border-radius: 20px; color: #d4af37; font-weight: bold; }
        button:hover { background: #d4af37; color: white; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: white; border: 1px solid #eee; padding: 15px; position: relative; }
        .no-photo { height: 250px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: #999; }
        img { width: 100%; height: 250px; object-fit: cover; }
        .price { color: #d4af37; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

<h1>The Jewelry Collection</h1>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search name, stone, or SKU..." onkeyup="runSearch()">
</div>

<div class="nav">
    <button onclick="loadItems('All')">All</button>
    <button onclick="loadItems('Ring')">Rings</button>
    <button onclick="loadItems('Necklace')">Necklaces</button>
    <button onclick="loadItems('Earrings')">Earrings</button>
</div>

<div id="jewelryGrid" class="grid">Loading...</div>

<script>
    const SUPABASE_URL = 'https://fnlgermttuaibfvmbite.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Global variable to hold our data so we don't have to ask Supabase every time we type a letter
    let allJewelry = [];

    async function loadItems(cat = 'All') {
        const grid = document.getElementById('jewelryGrid');
        grid.innerHTML = "Loading...";

        let query = _supabase.from('InventoryHistory').select('*');
        if (cat !== 'All') { query = query.eq('ItemCategory', cat); }

        const { data, error } = await query;
        if (error) { grid.innerHTML = "Error!"; return; }

        allJewelry = data; // Save the data for searching later
        renderGallery(allJewelry);
    }

    // 3. THE SEARCH LOGIC
    function runSearch() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        
        const filtered = allJewelry.filter(item => {
            const name = (item.ItemName || "").toLowerCase();
            const stone = (item.Stone || "").toLowerCase();
            const sku = (item.BrandSku || "").toLowerCase();
            return name.includes(term) || stone.includes(term) || sku.includes(term);
        });

        renderGallery(filtered);
    }

    // 4. THE DRAWING LOGIC (Helper function)
    function renderGallery(items) {
        const grid = document.getElementById('jewelryGrid');
        grid.innerHTML = "";

        items.forEach(item => {
            if (item.Status === 'Paused') return;
            const card = document.createElement('div');
            card.className = 'card';

            let photo = '<div class="no-photo">No Photo</div>';
            if (item.image_url && item.image_url.includes('http')) {
                photo = `<img src="${item.image_url}" onerror="this.outerHTML='<div class=\'no-photo\'>No Photo</div>';">`;
            }

            card.innerHTML = `${photo} <h3>${item.ItemName || 'Unnamed'}</h3> <p class="price">$${item.Price || '0'}</p>`;
            grid.appendChild(card);
        });
    }

    loadItems(); // Run when page opens
</script>
</body>
</html>
