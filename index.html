<script>
    // --- SET THIS FOR EVERY CUSTOMER ---
    const MY_HANDLE = 'destashe'; 

    const SUPABASE_URL = 'https://fnlgermttuaibfvmbite.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_YjZlmPXMzp2frMHVVtpfAQ_Im7YknVc';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadGallery() {
        // 1. Fetch only THIS creator's items
        const { data, error } = await _supabase.from('InventoryHistory')
            .select('*')
            .eq('creator_handle', MY_HANDLE);

        if (error) return;

        // 2. Check THIS creator's live status
        const statusItem = data.find(item => item.ItemName === 'SYSTEM_STORE_STATUS');
        const isStoreLive = statusItem && statusItem.Status === 'Paused';
        
        document.getElementById('liveBanner').style.display = isStoreLive ? 'block' : 'none';

        // 3. Render only THIS creator's jewelry
        const jewelry = data.filter(item => item.ItemName !== 'SYSTEM_STORE_STATUS');
        const grid = document.getElementById('jewelryGrid');
        grid.innerHTML = "";

        jewelry.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            let overlay = isStoreLive ? '<div class="frozen-overlay">Paused for Live</div>' : '';
            card.innerHTML = `${overlay}<img src="${item.image_url}"><div class="card-info"><div class="price">$${item.Price}</div></div>`;
            grid.appendChild(card);
        });
    }
    loadGallery();
</script>
